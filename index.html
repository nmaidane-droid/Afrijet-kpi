// ── Report ───────────────────────────────────────────────────────────────────
function buildReport(flights, kpis, now, finData, maintData, safetyData, aircraft) {
  const ds=now.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
  const G="#00936A",O="#D97706",N="#0F1F3D";

  // Filter to current week (Monday to Sunday)
  const getMonday=d=>{const day=d.getDay()||7;const mon=new Date(d);mon.setDate(d.getDate()-day+1);mon.setHours(0,0,0,0);return mon;};
  const monday=getMonday(now);
  const sunday=new Date(monday);sunday.setDate(monday.getDate()+6);sunday.setHours(23,59,59,999);
  const weekFlights=flights.filter(f=>{
    if(!f.date)return false;
    const fd=new Date(f.date);
    return fd>=monday&&fd<=sunday;
  });
  const weekLabel=monday.toLocaleDateString("fr-FR",{day:"numeric",month:"short"})+" — "+sunday.toLocaleDateString("fr-FR",{day:"numeric",month:"short"});

  const volsDoneR=weekFlights.filter(f=>f.status==="Termine");
  const done=volsDoneR.length;
  const tPax=weekFlights.reduce((s,f)=>s+f.pax,0);
  // Use first aircraft data if available, fallback to maintData
  const acList=aircraft&&aircraft.length>0?aircraft:[maintData||{}];
  const md=acList[0]||maintData||{};
  const mels=acList.reduce((all,ac)=>[...all,...(ac.mels||[])],[]);
  const fd=finData||[];
  const tRev=fd.reduce((s,f)=>s+f.revenus,0);
  const tCout=fd.reduce((s,f)=>s+f.couts,0);
  const marge=tRev>0?Math.round((1-tCout/tRev)*1000)/10:0;

  // Computed KPIs from flights
  const otpScoreR=f=>f.delayMin<=0?100:f.delayMin<=15?85:f.delayMin<=30?70:f.delayMin<=45?50:25;
  const rOtp=volsDoneR.length>0?Math.round(volsDoneR.reduce((s,f)=>s+otpScoreR(f),0)/volsDoneR.length):kpis.otp||0;
  const rLf=volsDoneR.length>0?Math.round(volsDoneR.reduce((s,f)=>s+f.load,0)/volsDoneR.length):kpis.loadFactor||0;
  const rDelayVols=volsDoneR.filter(f=>f.delayMin>0);
  const rDelay=rDelayVols.length>0?Math.round(rDelayVols.reduce((s,f)=>s+f.delayMin,0)/rDelayVols.length):kpis.delayMin||0;
  const rConsoVols=volsDoneR.filter(f=>f.consoH>0);
  const rConso=rConsoVols.length>0?Math.round(rConsoVols.reduce((s,f)=>s+f.consoH,0)/rConsoVols.length):kpis.consoH||0;
  const rNpsVols=volsDoneR.filter(f=>f.nps>0);
  const rNps=rNpsVols.length>0?Math.round(rNpsVols.reduce((s,f)=>s+f.nps,0)/rNpsVols.length*10)/10:kpis.nps||0;

  const row=(v1,l1,c1,v2,l2,c2,v3,l3,c3)=>{
    const fs=n=>String(n).length>8?"13px":String(n).length>5?"16px":"20px";
    const fsSame=(a,b,c)=>{const s=[a,b,c].map(n=>String(n).length);const max=Math.max(...s);return max>8?"13px":max>5?"16px":"20px";};
    const f=fsSame(v1,v2,v3);
    return "<div style='display:grid;grid-template-columns:1fr 1fr 1fr'><div style='text-align:center;padding:10px 4px;border-right:1px solid #EEF2F8'><div style='font-size:"+f+";font-weight:800;color:"+c1+"'>"+v1+"</div><div style='font-size:9px;color:#64748B;font-weight:700;text-transform:uppercase'>"+l1+"</div></div><div style='text-align:center;padding:10px 4px;border-right:1px solid #EEF2F8'><div style='font-size:"+f+";font-weight:800;color:"+c2+"'>"+v2+"</div><div style='font-size:9px;color:#64748B;font-weight:700;text-transform:uppercase'>"+l2+"</div></div><div style='text-align:center;padding:10px 4px'><div style='font-size:"+f+";font-weight:800;color:"+c3+"'>"+v3+"</div><div style='font-size:9px;color:#64748B;font-weight:700;text-transform:uppercase'>"+l3+"</div></div></div>";
  };

  const kpiLine=(l,v,o,ok)=>
    "<div style='display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #EEF2F8'><div style='flex:1;font-size:12px;color:#475569'>"+l+"<div style='font-size:10px;color:#94A3B8'>Objectif: "+o+"</div></div><div style='font-weight:800;font-size:13px;color:"+N+";padding-right:8px'>"+v+"</div><span style='background:"+(ok?"#D1FAE5":"#FEF3C7")+";color:"+(ok?"#065F46":"#92400E")+";padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700'>"+(ok?"OK":"Att.")+"</span></div>";

  const sec=(t,c)=>"<div style='background:"+c+";color:white;padding:7px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em'>"+t+"</div>";
  const card=c=>"<div style='background:white;border:1px solid #E2E8F0;border-radius:10px;overflow:hidden;margin:10px 12px'>"+c+"</div>";

  const gridStyle="display:grid;grid-template-columns:46px 64px 68px 36px 32px 20px 40px;align-items:center;padding:4px 6px;border-bottom:1px solid #EEF2F8;";
  const fHeader="<div style='"+gridStyle+"background:#EEF2F8;border-bottom:1px solid #DDE3ED'>"
    +"<div style='font-size:8px;font-weight:700;color:#64748B;text-transform:uppercase;padding-left:11px'>Vol</div>"
    +"<div style='font-size:8px;font-weight:700;color:#64748B;text-transform:uppercase;text-align:center'>Route</div>"
    +"<div style='font-size:8px;font-weight:700;color:#64748B;text-transform:uppercase;text-align:center'>BLK Time</div>"
    +"<div style='font-size:8px;font-weight:700;color:#64748B;text-transform:uppercase;text-align:center'>Date</div>"
    +"<div style='font-size:8px;font-weight:700;color:#64748B;text-transform:uppercase;text-align:center'>FLT</div>"
    +"<div style='font-size:8px;font-weight:700;color:#64748B;text-transform:uppercase;text-align:center'>Pax</div>"
    +"<div style='font-size:8px;font-weight:700;color:#64748B;text-transform:uppercase;text-align:right'>CM1</div>"
    +"</div>";
  const fRows=fHeader+weekFlights.map((f,i)=>{
    const dot=f.status==="Termine"?"#00936A":f.status==="En vol"?"#D97706":"#94A3B8";
    let durVal="--";
    if(f.status==="Termine"&&f.depReal&&f.arrReal&&f.depReal.length>=4&&f.arrReal.length>=4){
      const[dh,dm]=f.depReal.split(":").map(Number);
      const[ah,am]=f.arrReal.split(":").map(Number);
      const r=(ah*60+am)-(dh*60+dm);
      if(r>0)durVal=Math.floor(r/60)+"h"+String(r%60).padStart(2,"0");
    } else if(f.dureeMin>0){
      durVal=Math.floor(f.dureeMin/60)+"h"+String(f.dureeMin%60).padStart(2,"0");
    }
    const durColor=f.status==="Termine"?"#00936A":"#94A3B8";
    const dateShort=f.date?f.date.slice(8)+"/"+f.date.slice(5,7):"--";
    const cm1Last=(f.cm1||"--").split(" ").slice(-1)[0];
    return "<div style='"+gridStyle+"background:"+(i%2?"#F8FAFC":"white")+"'>"
      +"<div style='display:flex;align-items:center;gap:4px'><span style='width:7px;height:7px;border-radius:50%;background:"+dot+";display:inline-block;flex-shrink:0'></span><span style='font-weight:800;font-size:10px;color:#0F1F3D'>"+f.num+"</span></div>"
      +"<div style='font-size:10px;font-weight:700;white-space:nowrap;text-align:center'>"+f.from+"→"+f.to+"</div>"
      +"<div style='font-size:8.5px;color:#64748B;white-space:nowrap;text-align:center'>"+f.dep+"-"+f.arr+"</div>"
      +"<div style='font-size:8.5px;color:#94A3B8;white-space:nowrap'>"+dateShort+"</div>"
      +"<div style='font-size:10px;font-weight:700;color:"+durColor+";text-align:center'>"+durVal+"</div>"
      +"<div style='font-size:10px;text-align:center'>"+f.pax+"</div>"
      +"<div style='font-size:9px;color:#64748B;text-align:right'>"+cm1Last+"</div>"
      +"</div>";
  }).join("");

  const allMelsForReport=acList.reduce((all,ac)=>[...all,...(ac.mels||[]).map(m=>({...m,acImmat:acList.length>1?ac.immat:null}))],[]);
  const melRows=(()=>{
    if(allMelsForReport.length===0) return "<div style='padding:8px 12px;font-size:11px;color:#94A3B8;text-align:center'>Aucun MEL actif</div>";
    return allMelsForReport.map(m=>{
      const today=new Date();
      const parts=(m.exp||"").split("/");
      const year=parts.length===3?(parts[2].length===2?"20"+parts[2]:parts[2]):null;
      const exp=year?new Date(year+"-"+parts[1]+"-"+parts[0]):null;
      const daysLeft=exp&&!isNaN(exp)?Math.ceil((exp-today)/(1000*60*60*24)):null;
      const expColor=daysLeft===null?"#64748B":daysLeft<7?"#DC2626":daysLeft<30?"#D97706":"#00936A";
      const expBg=daysLeft===null?"#F1F5F9":daysLeft<7?"#FEE2E2":daysLeft<30?"#FEF3C7":"#D1FAE5";
      const catColor=m.sev==="A"?"#DC2626":m.sev==="B"?"#D97706":"#64748B";
      const catBg=m.sev==="A"?"#FEE2E2":m.sev==="B"?"#FEF3C7":"#F1F5F9";
      const daysStr=daysLeft===null?"":daysLeft<0?"EXPIRÉ":daysLeft===0?"Auj.":daysLeft+"j";
      return "<div style='padding:8px 12px;border-top:1px solid #EEF2F8;display:flex;gap:8px;align-items:center'>"+
        "<span style='background:"+catBg+";color:"+catColor+";padding:2px 7px;border-radius:6px;font-size:9px;font-weight:700;flex-shrink:0'>Cat."+m.sev+"</span>"+
        "<div style='flex:1'>"+
          "<div style='font-size:11px;font-weight:600;color:#0F1F3D'>"+m.sys+"</div>"+
          "<div style='font-size:9px;color:#64748B;margin-top:1px'>"+(m.mel||"")+(m.acImmat?" · "+m.acImmat:"")+"</div>"+
        "</div>"+
        "<div style='text-align:right;flex-shrink:0'>"+
          "<div style='background:"+expBg+";color:"+expColor+";padding:2px 7px;border-radius:6px;font-size:9px;font-weight:700'>"+(m.exp||"--")+"</div>"+
          (daysStr?"<div style='font-size:8px;color:"+expColor+";margin-top:2px;text-align:center'>"+daysStr+"</div>":"")+
        "</div>"+
      "</div>";
    }).join("");
  })();

  const finRows=fd.map((f,i)=>{
    const m=f.revenus>0?Math.round((1-f.couts/f.revenus)*100):0;
    return "<div style='display:flex;align-items:center;padding:7px 12px;border-bottom:1px solid #EEF2F8;background:"+(i%2?"#F8FAFC":"white")+"'><div style='flex:1;font-size:12px;font-weight:600'>"+f.mois+"</div><div style='font-size:11px;color:#1E293B'>"+fmtMAD(f.revenus)+" MAD</div><div style='font-size:11px;color:#64748B;min-width:40px;text-align:right'>"+m+"%</div></div>";
  }).join("");

  return (
    "<div style='font-family:Arial,sans-serif;background:#F8FAFC;padding-bottom:20px'><div style='background:linear-gradient(135deg,#0F1F3D,#1D3461);padding:16px 12px 14px;display:flex;align-items:center;gap:12px'><img src='"+LOGO_B64+"' alt='Afrijet' style='width:48px;height:34px;object-fit:contain;background:white;border-radius:6px;padding:2px;flex-shrink:0'/><div><div style='color:#A0720A;font-size:9px;font-weight:700;text-transform:uppercase;margin-bottom:4px'>Afrijet Sahara</div><div style='color:white;font-size:18px;font-weight:800;margin-bottom:2px'>Rapport KPI Opérationnel</div><div style='color:#94A3B8;font-size:11px'>"+ds+"</div></div></div>"+
    card(row(done,"Termines",G,flights.filter(f=>f.status==="En vol").length,"En vol",O,fmtMAD(tPax),"PAX total",N))+
    card(sec("Performance","#0F1F3D")+
      kpiLine("OTP (ponctualite)",rOtp+"%","90%",rOtp>=90)+
      kpiLine("Load Factor",rLf+"%","80%",rLf>=80)+
      kpiLine("Retards moy.",rDelay+" min","15 min",rDelay<=15)+
      kpiLine("Conso. carburant",rConso+" kg/h","900 kg/h",rConso<900)+
      kpiLine("NPS client",rNps+"/10","7",rNps>=7)
    )+
    card(sec("Rotations semaine du "+weekLabel+" — "+weekFlights.length+" vols","#0F1F3D")+fRows)+
    card(sec("Maintenance CAMO","#00936A")+
      acList.map(ac=>{
        const acTitle="<div style='display:flex;align-items:center;gap:8px;padding:8px 12px;background:#EEF2F8;border-bottom:2px solid #00936A'>"+
          "<span style='font-size:16px'>🛩</span>"+
          "<div><div style='font-size:13px;font-weight:800;color:#0F1F3D'>"+ac.immat+"</div>"+
          "<div style='font-size:10px;color:#64748B'>"+ac.type+"</div></div></div>";
        const acMels=(ac.mels||[]);
        const melSection=acMels.length===0
          ?"<div style='padding:6px 12px 10px;font-size:10px;color:#94A3B8;font-style:italic'>Aucun MEL actif</div>"
          : "<div style='padding:6px 12px 4px;font-size:10px;font-weight:800;color:#0F1F3D;text-transform:uppercase;letter-spacing:0.08em'>MEL Actifs — "+ac.immat+"</div>"+
            acMels.map(m=>{
              const today=new Date();
              const parts=(m.exp||"").split("/");
              const year=parts.length===3?(parts[2].length===2?"20"+parts[2]:parts[2]):null;
              const exp=year?new Date(year+"-"+parts[1]+"-"+parts[0]):null;
              const daysLeft=exp&&!isNaN(exp)?Math.ceil((exp-today)/(1000*60*60*24)):null;
              const expColor=daysLeft===null?"#64748B":daysLeft<7?"#DC2626":daysLeft<30?"#D97706":"#00936A";
              const expBg=daysLeft===null?"#F1F5F9":daysLeft<7?"#FEE2E2":daysLeft<30?"#FEF3C7":"#D1FAE5";
              const catColor=m.sev==="A"?"#DC2626":m.sev==="B"?"#D97706":"#64748B";
              const catBg=m.sev==="A"?"#FEE2E2":m.sev==="B"?"#FEF3C7":"#F1F5F9";
              const daysStr=daysLeft===null?"":daysLeft<0?"EXPIRÉ":daysLeft===0?"Auj.":daysLeft+"j";
              return "<div style='padding:8px 12px;border-top:1px solid #EEF2F8;display:flex;gap:8px;align-items:center'>"+
                "<span style='background:"+catBg+";color:"+catColor+";padding:2px 7px;border-radius:6px;font-size:9px;font-weight:700;flex-shrink:0'>Cat."+m.sev+"</span>"+
                "<div style='flex:1'><div style='font-size:11px;font-weight:600;color:#0F1F3D'>"+m.sys+"</div>"+
                "<div style='font-size:9px;color:#64748B;margin-top:1px'>"+(m.mel||"")+"</div></div>"+
                "<div style='text-align:right;flex-shrink:0'>"+
                "<div style='background:"+expBg+";color:"+expColor+";padding:2px 7px;border-radius:6px;font-size:9px;font-weight:700'>"+(m.exp||"--")+"</div>"+
                (daysStr?"<div style='font-size:8px;color:"+expColor+";margin-top:2px;text-align:center'>"+daysStr+"</div>":"")+
                "</div></div>";
            }).join("");
        return acTitle+
          row((ac.ttaf||0)+"h","TTAF",N,(acMels).length,"MEL actifs",(acMels).length>0?O:G,"",""," ")+
          row((ac.nextCheckH||"--")+(ac.nextCheckH?"h":""),"A-Check dans",(ac.nextCheckH||999)<50?"#DC2626":(ac.nextCheckH||999)<100?O:G,(ac.bCheckH||"--")+(ac.bCheckH?"h":""),"B-Check dans",!ac.bCheckH||ac.bCheckH>300?G:ac.bCheckH>100?O:"#DC2626",(ac.cCheckH||"--")+(ac.cCheckH?"h":""),"C-Check dans",!ac.cCheckH||ac.cCheckH>500?G:ac.cCheckH>200?O:"#DC2626")+
          melSection;
      }).join("")+
      (()=>{
        const fiab=md.fiabMoteurs||0;
        const techV=flights.filter(f=>f.status==="Termine"&&f.causeRetard==="Technique");
        const doneV=flights.filter(f=>f.status==="Termine");
        const td=doneV.length>0?Math.round((techV.length/doneV.length)*1000)/10:0;
        const planned=flights.filter(f=>f.status!=="Annule");
        const dr=planned.length>0?Math.round((doneV.length/planned.length)*1000)/10:0;
        const techCan=flights.filter(f=>f.status==="Annule"&&f.causeRetard==="Technique");
        const compBase=planned.length-techCan.length;
        const cf=compBase>0?Math.round((doneV.length/compBase)*1000)/10:0;
        return sec("Indicateurs Flotte","#0F1F3D")+
               row(fiab+"%","Fiabilite moteurs",fiab>=99.5?G:O,td+"%","Tech Delay",td<2?G:O,"",""," ")+
               row(dr+"%","Dispatch Reliability",dr>=99?G:dr>=95?O:"#DC2626",cf+"%","Completion Factor",cf>=99?G:cf>=95?O:"#DC2626","",""," ");
      })()
    )+
    (()=>{
      const sd=safetyData||[];
      const tot={approche:sd.filter(e=>e.approche).length,tcas:sd.filter(e=>e.tcas).length,gpws:sd.filter(e=>e.gpws).length,hardLanding:sd.filter(e=>e.hardLanding).length,safa:sd.filter(e=>e.safa).length};
      const vd=flights.filter(f=>f.status==="Termine").length||1;
      const secRow=(label,count,color)=>"<div style='display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #EEF2F8'><div style='flex:1;font-size:12px;color:#475569'>"+label+"</div><div style='font-weight:800;font-size:13px;color:"+(count>0?color:"#00936A")+";min-width:28px;text-align:right;padding-right:12px'>"+count+"</div><span style='background:"+(count>0?"#FEE2E2":"#D1FAE5")+";color:"+(count>0?color:"#065F46")+";padding:2px 8px;border-radius:10px;font-size:12px;font-weight:700;min-width:52px;text-align:center;display:inline-block'>"+(Math.round(count/vd*1000)/10)+"%</span></div>";
      return card(sec("Sécurité Opérationnelle","#DC2626")+
        secRow("Approches instables",tot.approche,"#DC2626")+
        secRow("TCAS RA",tot.tcas,"#DC2626")+
        secRow("GPWS Warnings",tot.gpws,"#D97706")+
        secRow("Hard Landings",tot.hardLanding,"#D97706")+
        secRow("Inspections SAFA",tot.safa,"#7C3AED")
      );
    })()+
    (fd.length>0?card(sec("Finances Cumul "+now.getFullYear(),"#7C3AED")+
      row(fmtMAD(tRev)+" MAD","Revenus",G,fmtMAD(tCout)+" MAD","Couts",N,marge+"%","Marge brute",marge>0?G:O)+
      finRows
    ):"")+
    "<div style='text-align:center;padding:12px;font-size:9px;color:#94A3B8'>Afrijet Sahara \u00B7 DGAC Maroc \u00B7 Confidentiel</div></div>"
  );
}

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [now,setNow]         = useState(new Date());
  const [tab,setTab]         = usePersist("tab","forms");
  const [flights,setFlights] = usePersist("flights",INIT_FLIGHTS);
  // Auto-upgrade: if demo data is old (fewer than 8 flights), reload with new demo
  useEffect(()=>{
    if(flights.length>0 && flights.length<8 && flights.every(f=>f.num&&f.num.startsWith("AJS"))){
      const hasOldData = !flights.some(f=>f.date==="2026-06-24"||f.date==="2026-06-25");
      if(hasOldData) setFlights(INIT_FLIGHTS);
    }
  },[]);
  const [kpis,setKpis]       = usePersist("kpis",INIT_KPIS);
  const [maintData,setMaint] = usePersist("maint",INIT_MAINT);
  const [finData,setFin]     = usePersist("fin",INIT_FIN);
  const [safetyData,setSafety] = usePersist("safety",INIT_SAFETY);
  const [crew,setCrew]       = usePersist("crew",INIT_CREW);
  const [aircraft,setAircraft] = usePersist("aircraft",INIT_AIRCRAFT);
  const [dismissed,setDism]  = usePersist("dismissed",[]);
  const [alertHist,setAlertHist] = usePersist("alertHist",[]);
  const [melHist,setMelHist]     = usePersist("melHist",[]);
  const [icao24,setIcao24]   = usePersist("icao24","020035");
  const [ac,setAc]           = useState(null);
  const [mTraffic,setMTraff] = useState([]);
  const [loading,setLoading] = useState(false);
  const [showReset,setReset] = useState(false);
  const [report,setReport]   = useState(null);
  const [saveOk,setSaveOk]   = useState(false);

  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),30000);return()=>clearInterval(t);},[]);

  // Auto-save every 15 minutes
  useEffect(()=>{
    const t=setInterval(async()=>{
      if(window.storage){
        const data={flights,kpis,maintData,finData,dismissed,icao24,safetyData,crew,alertHist,aircraft,melHist};
        await window.storage.set(PFX+"snapshot",JSON.stringify(data)).catch(()=>{});
      }
      setSaveOk(true);setTimeout(()=>setSaveOk(false),2000);
    }, 15*60*1000);
    return()=>clearInterval(t);
  },[flights,kpis,maintData,finData,dismissed,icao24]);

  const refresh = async () => {
    setLoading(true);
    try {
      const [st,tr] = await Promise.all([fetchByIcao24(icao24),fetchMorocco()]);
      if(st){const p=parseState(st);if(p){setAc({...p,simulated:false,alt_ft:p.alt_m?Math.round(p.alt_m*3.281):null,speed_kt:p.speed_ms?Math.round(p.speed_ms*1.944):null});}}
      else{setAc(simulateFlightState(icao24));}
      setMTraff(tr);
    } catch(_e){setAc(simulateFlightState(icao24));}
    setLoading(false);
  };

  useEffect(()=>{refresh();},[icao24]);

  const doSave = async () => {
    if(window.storage){
      const data={flights,kpis,maintData,finData,dismissed,icao24,safetyData,crew,alertHist,aircraft,melHist};
      await window.storage.set(PFX+"snapshot",JSON.stringify(data)).catch(()=>{});
    }
    setSaveOk(true);setTimeout(()=>setSaveOk(false),2000);
  };

  const doReset = () => {
    clearStorage();
    setFlights(INIT_FLIGHTS);setKpis(INIT_KPIS);setMaint(INIT_MAINT);setFin(INIT_FIN);setSafety(INIT_SAFETY);
    setCrew(INIT_CREW);setAircraft(INIT_AIRCRAFT);setDism([]);setAlertHist([]);setMelHist([]);setReport(null);setReset(false);setTab("forms");
  };

  const allAlerts  = computeAlerts(kpis,flights,maintData,aircraft);
  const critCount  = allAlerts.filter(a=>!dismissed.includes(a.id)).length;

  // Record new alerts in history
  React.useEffect(()=>{
    const now=new Date().toISOString();
    setAlertHist(h=>{
      const existing=new Set(h.map(e=>e.id+e.date.slice(0,10)));
      const today=now.slice(0,10);
      const newEntries=allAlerts
        .filter(a=>!existing.has(a.id+today))
        .map(a=>({id:a.id,icon:a.icon,msg:a.msg,sev:a.sev,date:now,status:"active"}));
      return newEntries.length>0?[...newEntries,...h].slice(0,200):h;
    });
  },[allAlerts.map(a=>a.id).join(",")]);

  // Dismiss handler that also updates history
  const handleDismiss=(id)=>{
    setDism(d=>[...d,id]);
    setAlertHist(h=>h.map(e=>e.id===id&&e.status==="active"
      ?{...e,status:"resolue",resolvedAt:new Date().toISOString()}:e));
  };
  const timeStr    = now.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});

  const TABS=[
    {id:"forms",icon:"📝",label:"Formulaires"},
    {id:"live", icon:"📡",label:"Live"},
    {id:"alertes",icon:"🔔",label:"Alertes"},
    {id:"ops",  icon:"✈", label:"Ops."},
    {id:"perf", icon:"📊",label:"Perf."},
    {id:"secu", icon:"🛡",label:"Sécurité"},
    {id:"maint",icon:"🔧",label:"Maint."},
    {id:"fin",  icon:"💰",label:"Finances"},
  ];

  return (
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"Inter,-apple-system,system-ui,sans-serif",display:"flex",flexDirection:"column",position:"relative"}}>
      <style>{`*{box-sizing:border-box;margin:0;padding:0;}@keyframes dot-pulse{0%,100%{opacity:1}50%{opacity:.5}}input,select,button{-webkit-tap-highlight-color:transparent;font-family:inherit;}::-webkit-scrollbar{display:none;}`}</style>

      {/* TOP BAR */}
      <div style={{background:C.white,borderBottom:"1px solid "+C.border,padding:"0 12px",height:TOP,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 6px rgba(0,0,0,.06)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
          <div style={{width:48,height:34,borderRadius:9,flexShrink:0,background:"white",border:"1px solid #DDE3ED",display:"flex",alignItems:"center",justifyContent:"center",padding:"2px 4px"}}>
            <img src={LOGO_B64} alt="Afrijet Sahara" style={{width:"100%",height:"100%",objectFit:"contain"}}/>
          </div>
          <div style={{minWidth:0}}>
            <div style={{fontWeight:800,fontSize:13,color:C.navy,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>AFRIJET SAHARA</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:ac&&!ac.simulated?C.emerald:ac?C.warn:C.border,flexShrink:0}}/>
            <span style={{fontSize:11,color:C.slate,fontWeight:600}}>{ac&&!ac.simulated?"LIVE":"SIM"}</span>
          </div>
          <span style={{fontSize:12,fontWeight:700,color:C.navy}}>{timeStr}</span>
          <button onClick={doSave}
            title="Sauvegarde auto: 15 min"
            style={{width:36,height:36,background:saveOk?C.emerald:C.navy,border:"none",borderRadius:9,cursor:"pointer",color:"white",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",WebkitTapHighlightColor:"transparent"}}>
            {saveOk?"✓":"💾"}
          </button>
          <button onClick={()=>setReport(buildReport(flights,kpis,now,finData,maintData,safetyData,aircraft))}
            style={{width:36,height:36,background:C.emerald,border:"none",borderRadius:9,cursor:"pointer",color:"white",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",WebkitTapHighlightColor:"transparent"}}>
            📋
          </button>
        </div>
      </div>

      {/* CONTENT */}
      <div style={{flex:1,overflowY:"auto",padding:"14px 14px "+(BOT+14)+"px"}}>
        {tab==="forms"   && <ScreenForms
          onSubmitVol={d=>{setFlights(f=>[...f,d]);}}
          onSubmitMaint={d=>{
            if(d.acId){
              setAircraft(prev=>prev.map(a=>a.id===d.acId?{...a,...d}:a));
            } else {
              setMaint(d);
            }
          }}
          onSubmitFin={d=>setFin(f=>[...f,d])}
          onSubmitSafety={d=>setSafety(s=>[...s,d])}
          onReset={()=>setReset(true)}
          flights={flights} crew={crew} setCrew={setCrew}
          maintData={maintData} finData={finData} kpis={kpis} dismissed={dismissed} safetyData={safetyData}
          aircraft={aircraft} onUpdateAircraft={setAircraft}
          melHist={melHist} setMelHist={setMelHist}
          onImport={data=>{
            if(data.flights)   setFlights(data.flights);
            if(data.maintData) setMaint(data.maintData);
            if(data.crew)      setCrew(data.crew);
            if(data.finData)   setFin(data.finData);
            if(data.kpis)      setKpis(data.kpis);
            if(data.dismissed) setDism(data.dismissed);
            if(data.safetyData)setSafety(data.safetyData);
            if(data.alertHist) setAlertHist(data.alertHist);
            if(data.melHist)   setMelHist(data.melHist);
            if(data.aircraft)  setAircraft(data.aircraft);
          }}
        />}
        {tab==="live"    && <ScreenLive ac={ac} moroccoTraffic={mTraffic} icao24={icao24} setIcao24={setIcao24} onRefresh={refresh} loading={loading} flights={flights} aircraft={aircraft}/>}
        {tab==="alertes" && <ScreenAlertes kpis={kpis} flights={flights} dismissed={dismissed} setDismissed={handleDismiss} maintData={maintData} alertHist={alertHist} setAlertHist={setAlertHist} aircraft={aircraft} melHist={melHist}/>}
        {tab==="ops"     && <ScreenOps flights={flights} safetyData={safetyData} onUpdateFlight={u=>setFlights(f=>f.map(x=>x.num===u.num?u:x))}/>}
        {tab==="perf"    && <ScreenPerf kpis={kpis} flights={flights} finData={finData}/>}
        {tab==="secu"    && <ScreenSecu safetyData={safetyData} flights={flights}/>}
        {tab==="maint"   && <ScreenMaint kpis={kpis} maintData={maintData} flights={flights} aircraft={aircraft}/>}
        {tab==="fin"     && <ScreenFin finData={finData}/>}
      </div>

      {/* RESET MODAL */}
      {showReset&&(
        <div style={{position:"fixed",inset:0,zIndex:700,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"white",borderRadius:16,padding:24,width:"100%",maxWidth:340,boxShadow:"0 8px 32px rgba(0,0,0,.3)"}}>
            <div style={{fontSize:32,textAlign:"center",marginBottom:12}}>🗑</div>
            <div style={{fontWeight:800,fontSize:16,color:C.navy,textAlign:"center",marginBottom:8}}>Reinitialiser l application</div>
            <div style={{fontSize:13,color:C.slate,textAlign:"center",lineHeight:1.6,marginBottom:20}}>Toutes les donnees demo seront effacees. Vous pourrez saisir vos vraies donnees.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setReset(false)}
                style={{flex:1,height:48,background:C.bg,border:"1.5px solid "+C.border,borderRadius:10,color:C.slate,fontSize:14,fontWeight:700,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
                Annuler
              </button>
              <button onClick={doReset}
                style={{flex:1,height:48,background:"#DC2626",border:"none",borderRadius:10,color:"white",fontSize:14,fontWeight:700,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
                Reinitialiser
              </button>
            </div>
          </div>
        </div>
      )}

      {report&&(
        <div style={{position:"fixed",inset:0,zIndex:500,display:"flex",flexDirection:"column",background:"#0F1F3D"}}>
          <div style={{padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,borderBottom:"2px solid #A0720A"}}>
            <div>
              <div style={{color:"white",fontWeight:800,fontSize:14}}>Rapport KPI</div>
              <div style={{color:"#A0720A",fontSize:10}}>Afrijet Sahara</div>
            </div>
            <button onClick={()=>setReport(null)}

              Fermer
            </button>
          </div>

                  const day=d.getDay()||7;
                  const mon=new Date(d);mon.setDate(d.getDate()-day+1);
                  const wk=mon.toISOString().slice(5,10);
                  if(!byWeekP[wk])byWeekP[wk]={date:wk,vols:[],pax:0,delayed:0,consomme:0,consoVols:0};
                  byWeekP[wk].vols.push(f);byWeekP[wk].pax+=f.pax;
                  if(f.delayMin>15)byWeekP[wk].delayed++;
                  if(f.consoH>0){byWeekP[wk].consomme+=f.consoH;byWeekP[wk].consoVols++;}
                });
                const days=Object.values(byWeekP).sort((a,b)=>a.date.localeCompare(b.date));

                      doc.text(m.sys||"--",M+15,y+4);
                      doc.setTextColor(100,116,139);doc.setFont("helvetica","normal");doc.setFontSize(6.5);
                      doc.text(m.mel||"",M+15,y+7);
                      const expColor=daysLeft===null?[100,116,139]:daysLeft<7?[220,38,38]:daysLeft<30?[217,119,6]:[0,147,106];
                      doc.setTextColor(...expColor);doc.setFont("helvetica","bold");doc.setFontSize(7.5);
                      const daysStr=daysLeft===null?"":daysLeft<0?" (EXPIRÉ)":daysLeft===0?" (Auj.)":` (${daysLeft}j)`;
                      doc.text((m.exp||"--")+daysStr,M+CW-2,y+4,{align:"right"});
                      if(i<acMels.length-1){doc.setDrawColor(226,232,240);doc.setLineWidth(0.2);doc.line(M,y+8,M+CW,y+8);}
                      y+=9;
                    });
                    y+=4;
                  } else {
                    doc.setFillColor(248,250,252);doc.rect(M,y,CW,6,"F");
                    doc.setTextColor(148,163,184);doc.setFont("helvetica","normal");doc.setFontSize(7.5);
                    doc.text("Aucun MEL actif",M+3,y+4.5);
                    y+=9;
                  }
                  if(acIdx<pAcList.length-1) y+=4;
                });
                const pTechVols=flights.filter(f=>f.status==="Termine"&&f.causeRetard==="Technique");
                const pDoneVols=flights.filter(f=>f.status==="Termine");
                const pTechDelay=pDoneVols.length>0?Math.round((pTechVols.length/pDoneVols.length)*1000)/10:0;
                const pPlanned=flights.filter(f=>f.status!=="Annule");
                const pDR=pPlanned.length>0?Math.round((pDoneVols.length/pPlanned.length)*1000)/10:0;
                const pTechCan=flights.filter(f=>f.status==="Annule"&&f.causeRetard==="Technique");
                const pCFBase=pPlanned.length-pTechCan.length;
                const pCF=pCFBase>0?Math.round((pDoneVols.length/pCFBase)*1000)/10:0;
                drawSection("  INDICATEURS FLOTTE",15,31,61);
                const pFiab=(pAcList[0]?.fiabMoteurs)||0;
                drawRow("Fiabilite moteurs",(pFiab||"--")+"%",pFiab>=99.5);
                drawRow("Tech delay",pTechDelay+"%",pTechDelay<2);
                drawRow("Dispatch Reliability",pDR+"%",pDR>=99);
                drawRow("Completion Factor",pCF+"%",pCF>=99,true);
                y+=6;

                // ── Sécurité ──
                const sd=safetyData||[];
                drawSection("  SECURITE OPERATIONNELLE",220,38,38);
                const vdP=flights.filter(f=>f.status==="Termine").length||1;
                const secItems=[
                  ["Approches instables",sd.filter(e=>e.approche).length],
                  ["TCAS RA",sd.filter(e=>e.tcas).length],
                  ["GPWS Warnings",sd.filter(e=>e.gpws).length],
                  ["Hard Landings",sd.filter(e=>e.hardLanding).length],
                  ["Inspections SAFA",sd.filter(e=>e.safa).length],
                ];
                secItems.forEach(([label,count],i)=>{
                  const pct=Math.round(count/vdP*1000)/10;
                  drawRow(label,count+" ("+pct+"%)",count===0,i===secItems.length-1);
                });
                y+=4;

                // ── Finances ──
                const fd=finData||[];
                if(fd.length>0){
                  const tRev=fd.reduce((s,f)=>s+f.revenus,0);
                  const tCout=fd.reduce((s,f)=>s+f.couts,0);
                  const marge=tRev>0?Math.round((1-tCout/tRev)*100):0;
                  if(y>240){doc.addPage();y=15;}
                  drawSection("  FINANCES - CUMUL "+now.getFullYear(),124,58,237);
                  drawRow("Revenus cumules",fmtMAD(tRev)+" MAD");
                  drawRow("Couts cumules",fmtMAD(tCout)+" MAD");
                  drawRow("Marge brute",marge+"%",marge>0);
                  y+=3;
                  // Monthly rows
                  fd.forEach((f,i)=>{
                    if(y>275){doc.addPage();y=15;}
                    const fm=f.revenus>0?Math.round((1-f.couts/f.revenus)*100):0;
                    doc.setFillColor(i%2===0?248:255,i%2===0?250:255,i%2===0?252:255);
                    doc.rect(M,y-3,CW,6,"F");
                    // Mois — left
                    doc.setTextColor(15,31,61);doc.setFont("helvetica","bold");doc.setFontSize(7.5);
                    doc.text(f.mois,M+3,y);
                    // Revenus — right aligned before marge
                    doc.setFont("helvetica","normal");doc.setTextColor(71,85,105);
                    doc.text(fmtMAD(f.revenus)+" MAD",M+CW-22,y,"right");
                    // Marge — far right
                    const mc=fm>0?[0,147,106]:fm===0?[217,119,6]:[220,38,38];
                    doc.setTextColor(...mc);doc.setFont("helvetica","bold");
                    doc.text(fm+"%",M+CW-3,y,"right");
                    if(i<fd.length-1){doc.setDrawColor(226,232,240);doc.setLineWidth(0.2);doc.line(M,y+3,M+CW,y+3);}
                    y+=6;
                  });
                  y+=4;
                }

                // ── Graphiques evolution ──
                if(days.length>=2){
                  drawSection("  GRAPHIQUES D EVOLUTION",15,31,61);
                  y+=2;

                  const drawChart=(chartData,title,color,target,minV,maxV,unitLabel)=>{
                    if(y>255){doc.addPage();y=15;}
                    const pts=chartData.filter(d=>d.val!==null);
                    if(pts.length<2)return;
                    const cX=M, cY=y, cW2=CW, cH2=22;
                    const lo=minV!==undefined?minV:Math.max(0,Math.min(...pts.map(p=>p.val))-5);
                    const hi=maxV!==undefined?maxV:Math.max(...pts.map(p=>p.val))+5;
                    const range=hi-lo||1;
                    const xS=i=>cX+(i/(pts.length-1))*cW2;
                    const yS=v=>cY+cH2-((v-lo)/range)*cH2;

                    const avgVal=Math.round(pts.reduce((s,p)=>s+p.val,0)/pts.length);
                    doc.setTextColor(71,85,105);
                    doc.setFontSize(7);
                    doc.setFont("helvetica","bold");
                    doc.text(title,cX,cY-1);
                    const r=color[0],g=color[1],b=color[2];
                    doc.setTextColor(r,g,b);
                    doc.text("Moy: "+String(avgVal)+unitLabel,cX+CW,cY-1,"right");

                    doc.setFillColor(248,250,252);
                    doc.roundedRect(cX,cY,cW2,cH2,1,1,"F");

                    doc.setDrawColor(226,232,240);
                    doc.setLineWidth(0.2);
                    [0,0.5,1].forEach(t=>{
                      const yy=cY+cH2*t;
                      doc.line(cX,yy,cX+cW2,yy);
                      doc.setTextColor(148,163,184);
                      doc.setFontSize(5.5);
                      doc.setFont("helvetica","normal");
                      doc.text(String(Math.round(hi-t*(hi-lo))),cX-1,yy+1,"right");
                    });

                    if(target!==undefined){
                      const ty2=yS(Math.min(hi,Math.max(lo,target)));
                      doc.setDrawColor(r,g,b);
                      doc.setLineWidth(0.4);
                      doc.setLineDashPattern([1.5,1.5],0);
                      doc.line(cX,ty2,cX+cW2,ty2);
                      doc.setLineDashPattern([],0);
                    }

                    doc.setDrawColor(r,g,b);
                    doc.setLineWidth(1.2);
                    for(let i=1;i<pts.length;i++){
                      doc.line(xS(i-1),yS(pts[i-1].val),xS(i),yS(pts[i].val));
                    }
                    pts.forEach((p,i)=>{
                      doc.setFillColor(r,g,b);
                      doc.circle(xS(i),yS(p.val),0.7,"F");
                    });
                    pts.forEach((p,i)=>{
                      if(pts.length<=7||i===0||i===pts.length-1||i%Math.ceil(pts.length/5)===0){
                        doc.setTextColor(148,163,184);
                        doc.setFontSize(5);
                        doc.setFont("helvetica","normal");
                        doc.text(p.label,xS(i),cY+cH2+3.5,"center");
                      }
                    });
                    y+=cH2+9;
                  };

                  drawChart(otpData,"Ponctualite OTP",[0,147,106],90,60,100,"%");                  drawChart(lfData,"Load Factor",[15,31,61],80,50,100,"%");
                  drawChart(consoData,"Consommation carburant",[160,114,10],900,600,1100," kg/h");
                  drawChart(npsData2,"NPS client",[124,58,237],7,4,10,"");
                }

                // ── Footer on all pages ──
                const nbPages=doc.internal.getNumberOfPages();
                for(let p=1;p<=nbPages;p++){
                  doc.setPage(p);
                  doc.setFillColor(15,31,61);
                  doc.rect(0,PH-10,PW,10,"F");
                  doc.setFillColor(160,114,10);
                  doc.rect(0,PH-11,PW,1,"F");
                  doc.setTextColor(255,255,255);
                  doc.setFontSize(6.5);
                  doc.setFont("helvetica","normal");
                  doc.text("AFRIJET SAHARA  |  DGAC MAROC  |  CONFIDENTIEL",PW/2,PH-4,"center");
                  doc.setTextColor(160,114,10);
                  doc.setFont("helvetica","bold");
                  doc.text("Page "+p+"/"+nbPages,PW-M,PH-4,"right");
                }

                doc.save("Rapport_KPI_Afrijet_"+now.toISOString().slice(0,10)+".pdf");
              } catch(e) {
                alert("Erreur PDF: "+e.message);
              }
            }}
              style={{width:"100%",height:46,background:"linear-gradient(135deg,#7C3AED,#5B21B6)",border:"none",borderRadius:10,color:"white",fontSize:14,fontWeight:700,cursor:"pointer",WebkitTapHighlightColor:"transparent",display:"flex",alignItems:"center",justifyContent:"center",gap:8,letterSpacing:"0.05em"}}>
              <span style={{fontSize:20}}>📄</span> Telecharger le rapport PDF
            </button>
          </div>

          <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
            <div dangerouslySetInnerHTML={{__html:report}}/>
          </div>
        </div>
      )}

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",height:BOT,background:C.white,borderTop:"1px solid "+C.border,display:"flex",alignItems:"stretch",boxShadow:"0 -2px 12px rgba(0,0,0,.08)",zIndex:200}}>
        {TABS.map(t=>{
          const active=tab===t.id;
          const badge=t.id==="alertes"&&critCount>0?critCount:null;
          return (
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,padding:"6px 2px",position:"relative",WebkitTapHighlightColor:"transparent",borderTop:active?"2.5px solid "+C.gold:"2.5px solid transparent"}}>
              <span style={{fontSize:17,lineHeight:1}}>{t.icon}</span>
              <span style={{fontSize:8,fontWeight:active?700:500,color:active?C.gold:C.slate}}>{t.label}</span>
              {badge&&(
                <div style={{position:"absolute",top:4,right:"50%",transform:"translateX(10px)",background:C.danger,color:"white",borderRadius:10,minWidth:16,height:16,fontSize:9,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>
                  {badge}
                </div>
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}


  </script>
</body>
</html>
