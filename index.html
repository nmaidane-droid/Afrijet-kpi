const supabase = window.supabase?.createClient(SUPA_URL, SUPA_KEY);

async function sbGet(key) {
  if(!supabase) return null;
  try {
    const {data,error} = await supabase.from("kv_store").select("value").eq("key",key).single();
    if(error||!data) return null;
    return JSON.parse(data.value);
  } catch(e) { return null; }
}

async function sbSet(key, value) {
  if(!supabase) return;
  try {
    await supabase.from("kv_store").upsert({key, value: JSON.stringify(value)}, {onConflict:"key"});
  } catch(e) {}
}

const C = {
  bg:"#F4F7FB", border:"#DDE3ED", card:"#FFFFFF",
  navy:"#0F1F3D", navyMid:"#1D3461",
  emerald:"#00936A", emeraldL:"#D1FAE5", emeraldD:"#006B4D",
  gold:"#A0720A", goldL:"#FEF3C7",
  slate:"#64748B", slateL:"#94A3B8",
  text:"#1E293B", textSub:"#64748B",
  danger:"#DC2626", dangerL:"#FEE2E2",
  warn:"#D97706", warnL:"#FEF3C7",
  white:"#FFFFFF",
};
const TOP=60, BOT=58, PFX="ajs135v1_";
const fmtMAD = n => Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");

const lsGet = k => { try { return localStorage.getItem(k); } catch(_e) { return null; } };
const lsSet = (k,v) => { try { localStorage.setItem(k,v); } catch(_e) {} };

function usePersist(key, init) {
  const fk = PFX+key;
  const [val, setVal] = useState(() => {
    const s = lsGet(fk);
    if (!s) return init;
    try { return JSON.parse(s); } catch(_e) { return init; }
  });

  // Load from Supabase on mount
  useEffect(() => {
    sbGet(fk).then(remote => {
      if(remote !== null) {
        setVal(remote);
        lsSet(fk, JSON.stringify(remote));
      }
    });
  }, [fk]);

  const set = v => {
    setVal(prev => {
      const next = typeof v === "function" ? v(prev) : v;
      const s = JSON.stringify(next);
      lsSet(fk, s);
      sbSet(fk, next);
      return next;
    });
  };
  return [val, set];
}

function clearStorage() {
  try {
    const keys = Object.keys(localStorage).filter(k => k.startsWith(PFX));
    keys.forEach(k => localStorage.removeItem(k));
  } catch(_e) {}
}

function PlaneIcon({ size=32, color="#A0720A", heading=0 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none"
      style={{ transform:"rotate("+heading+"deg)", transition:"transform 1s ease", display:"block" }}>
      <path d="M8 32 L24 28 L40 16 L44 18 L32 30 L52 28 L54 31 L32 36 L36 46 L32 47 L26 37 L14 40 Z" fill={color}/>
    </svg>
  );
}

function Card({ children, accent }) {
  return (
    <div style={{ background:C.card, borderRadius:14, border:"1px solid "+C.border,
                  padding:16, boxShadow:"0 1px 4px rgba(0,0,0,.05)",
                  borderTop:accent?"3px solid "+accent:undefined }}>
      {children}
    </div>
  );
}

function KpiTile({ title, value, unit, sub, accent, icon, info }) {
  const [show,setShow]=React.useState(false);
  return (
    <div style={{ background:C.card, borderRadius:12, padding:14,
                  border:"1px solid "+C.border, borderTop:"3px solid "+(accent||C.slate), position:"relative" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6 }}>
        <span style={{ fontSize:10, fontWeight:700, color:C.slate,
                       textTransform:"uppercase", letterSpacing:"0.09em", flex:1 }}>{title}</span>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          {info&&(
            <span onClick={e=>{e.stopPropagation();setShow(s=>!s);}}
              style={{fontSize:12,color:C.slateL,cursor:"pointer",fontWeight:700,
                background:C.bg,borderRadius:"50%",width:16,height:16,display:"flex",
                alignItems:"center",justifyContent:"center",flexShrink:0,
                border:"1px solid "+C.border,WebkitTapHighlightColor:"transparent"}}>ⓘ</span>
          )}
          <span style={{ fontSize:18 }}>{icon}</span>
        </div>
      </div>
      <div style={{ fontSize:String(value).length>7?"16px":String(value).length>5?"20px":"26px", fontWeight:800, color:accent||C.navy, lineHeight:1.1 }}>
        {value}<span style={{ fontSize:11, color:C.slate }}> {unit}</span>
      </div>
      {sub && <div style={{ fontSize:10, color:C.slateL, marginTop:4 }}>{sub}</div>}
      {show&&info&&(
        <div onClick={()=>setShow(false)}
          style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:999,background:"rgba(0,0,0,0.4)",
            display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div onClick={e=>e.stopPropagation()}
            style={{background:"white",borderRadius:14,padding:18,maxWidth:300,width:"100%",
              boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}}>
            <div style={{fontWeight:800,fontSize:14,color:C.navy,marginBottom:10}}>{title}</div>
            <div style={{fontSize:12,color:C.text,lineHeight:1.6,whiteSpace:"pre-line"}}>{info}</div>
            <button onClick={()=>setShow(false)}
              style={{marginTop:14,width:"100%",padding:"8px",background:C.navy,color:"white",
                border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>
              Fermer
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function Bar({ label, value, max, unit, color, sub }) {
  const pct = Math.min(100, Math.round(value/max*100));
  return (
    <div style={{ marginBottom:10 }}>
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
        <span style={{ fontSize:13, fontWeight:600, color:C.text }}>{label}</span>
        <span style={{ fontSize:13, fontWeight:700, color }}>{value}{unit||""}</span>
      </div>
      <div style={{ background:C.border, borderRadius:6, height:8, overflow:"hidden" }}>
        <div style={{ width:pct+"%", background:color, height:"100%", borderRadius:6, transition:"width .8s ease" }}/>
      </div>
      {sub && <div style={{ fontSize:11, color:C.slate, marginTop:3 }}>{sub}</div>}
    </div>
  );
}

function SectionTitle({ children }) {
  return (
    <div style={{ fontSize:10, fontWeight:700, color:C.slate,
                  textTransform:"uppercase", letterSpacing:"0.1em",
                  marginBottom:10, paddingBottom:6, borderBottom:"1px solid "+C.border }}>
      {children}
    </div>
  );
}

function FLabel({ children }) {
  return (
    <label style={{ fontSize:10, fontWeight:700, color:C.slate,
                    textTransform:"uppercase", letterSpacing:"0.09em",
                    display:"block", marginBottom:5 }}>
      {children}
    </label>
  );
}

function FField({ label, value, onChange, type="text", min, max, placeholder, step }) {
  const [focused, setFocused] = useState(false);
  const handleChange = e => {
    const v = type==="text" ? e.target.value.toUpperCase() : e.target.value;
    onChange(v);
  };
  return (
    <div>
      <FLabel>{label}</FLabel>
      <input type={type} value={value} min={min} max={max} step={step} placeholder={placeholder}
        onChange={handleChange} autoComplete="off" autoCorrect="off"
        onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
        style={{ width:"100%", height:48, boxSizing:"border-box",
                 background:focused?"#FFF":C.bg, border:"1.5px solid "+(focused?C.gold:C.border),
                 borderRadius:10, padding:"0 14px", color:C.text, fontSize:14, outline:"none" }}/>
    </div>
  );
}

function FSelect({ label, value, onChange, options }) {
  return (
    <div>
      <FLabel>{label}</FLabel>
      <select value={value} onChange={e=>onChange(e.target.value)}
        style={{ width:"100%", height:48, boxSizing:"border-box", background:C.bg,
                 border:"1.5px solid "+C.border, borderRadius:10, padding:"0 14px",
                 color:C.text, fontSize:14, outline:"none", appearance:"none" }}>
        {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
      </select>
    </div>
  );
}

function FGrid({ children }) {
  return <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>{children}</div>;
}

function FCalc({ label, value, sub, color="#00936A", wide }) {
  return (
    <div style={{ gridColumn:wide?"1 / -1":"auto" }}>
      <FLabel>{label}</FLabel>
      <div style={{ height:48, background:"#F0FDF4", border:"1.5px solid "+color,
                    borderRadius:10, display:"flex", alignItems:"center",
                    justifyContent:"center", gap:8 }}>
        <span style={{ fontSize:20, fontWeight:800, color }}>{value}</span>
        {sub && <span style={{ fontSize:9, color:C.slate }}>{sub}</span>}
      </div>
    </div>
  );
}

function FSection({ title, color="#64748B" }) {
  return (
    <div style={{ fontSize:10, fontWeight:700, color, textTransform:"uppercase",
                  letterSpacing:"0.09em", borderBottom:"1.5px solid "+color+"40",
                  paddingBottom:4, marginTop:4 }}>
      {title}
    </div>
  );
}

function FSubmit({ label, color="#0F1F3D", onClick, saved }) {
  const bg = saved ? "#00936A" : "#DC2626";
  const lbl = saved ? "✅ Enregistré" : label;
  return (
    <button onClick={onClick}
      style={{ width:"100%", height:52, background:bg, border:"none", borderRadius:12,
               cursor:"pointer", color:"white", fontSize:15, fontWeight:700,
               WebkitTapHighlightColor:"transparent", boxShadow:"0 2px 12px "+bg+"55",
               transition:"background 0.3s" }}>
      {lbl}
    </button>
  );
}

function FHeader({ icon, title, subtitle, color }) {
  const isJSX = typeof icon === "object" && icon !== null;
  return (
    <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16,
                  paddingBottom:14, borderBottom:"1px solid #EEF2F8" }}>
      <div style={{ width:46, height:46, borderRadius:12, background:isJSX?"transparent":color, flexShrink:0,
                    display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>
        {icon}
      </div>
      <div>
        <div style={{ fontWeight:800, fontSize:15, color:C.navy }}>{title}</div>
        <div style={{ fontSize:11, color:C.slateL, marginTop:1 }}>{subtitle}</div>
      </div>
    </div>
  );
}

function FAirport({ label, value, onChange }) {
  const [q, setQ]   = useState(value||"");
  const [open,setO] = useState(false);
  const res = q.length>=2
    ? WORLD_AIRPORTS.filter(a=>a.c.toUpperCase().startsWith(q.toUpperCase())||a.n.toLowerCase().includes(q.toLowerCase())).slice(0,8)
    : [];
  const pick = c => { onChange(c); setQ(c); setO(false); };
  const icaoKnown = q.length >= 3;
  return (
    <div style={{ position:"relative" }}>
      <FLabel>{label}</FLabel>
      <input value={q}
        onChange={e=>{setQ(e.target.value);setO(true);onChange(e.target.value.toUpperCase());}}
        onFocus={()=>setO(true)} onBlur={()=>setTimeout(()=>setO(false),150)}
        style={{ width:"100%", height:48, boxSizing:"border-box", background:C.bg,
                 border:"1.5px solid "+C.border, borderRadius:10, padding:"0 14px",
                 color:C.text, fontSize:14, outline:"none" }}/>
      {icaoKnown && <FlightCatBadge iata={q.toUpperCase()}/>}
      {open&&res.length>0&&(
        <div style={{ position:"absolute", top:76, left:0, right:0, zIndex:999,
                      background:"white", border:"1.5px solid "+C.gold, borderRadius:10,
                      boxShadow:"0 4px 20px rgba(0,0,0,.15)", maxHeight:220, overflowY:"auto" }}>
          {res.map(a=>(
            <button key={a.c} onMouseDown={()=>pick(a.c)}
              style={{ width:"100%", background:"none", border:"none", padding:"10px 14px",
                       cursor:"pointer", textAlign:"left", display:"flex", alignItems:"center",
                       gap:10, borderBottom:"1px solid "+C.bg, WebkitTapHighlightColor:"transparent" }}>
              <span style={{ fontWeight:800, fontSize:14, color:C.navy, fontFamily:"monospace", minWidth:36 }}>{a.c}</span>
              <span style={{ fontSize:12, color:C.slate }}>{a.n}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function geoToSvg(lat,lon,W,H) {
  const x=(lon+13.5)/(13.5-0.8)*W;
  const y=(36.1-lat)/(36.1-27.5)*H;
  return {x:Math.max(0,Math.min(W,x)),y:Math.max(0,Math.min(H,y))};
}

function calcFlightCategory(metar) {
  if(!metar) return "?";
  // Extract visibility (statute miles from metres or sm)
  let vis = 99;
  const smMatch = metar.match(/\b(\d+(?:\/\d+)?SM)\b/);
  const mMatch  = metar.match(/\b(\d{4})\b/);
  if(smMatch) {
    const raw = smMatch[1].replace("SM","");
    if(raw.includes("/")) { const [n,d]=raw.split("/"); vis=Number(n)/Number(d); }
    else vis = Number(raw);
  } else if(mMatch) {
    vis = Number(mMatch[1]) / 1609.34;
  }
  // Extract ceiling (BKN or OVC)
  let ceil = 99999;
  const ceilMatches = [...metar.matchAll(/(?:BKN|OVC)(\d{3})/g)];
  ceilMatches.forEach(m => { const ft=Number(m[1])*100; if(ft<ceil) ceil=ft; });
  if(ceil===99999 && metar.includes("CAVOK")) ceil=99999;
  if(ceil < 500  || vis < 1)   return "LIFR";
  if(ceil < 1000 || vis < 3)   return "IFR";
  if(ceil < 3000 || vis < 5)   return "MVFR";
  return "VFR";
}

function useMetar(iata) {
  const [fc, setFc] = React.useState("?");
  const [raw, setRaw] = React.useState("");
  React.useEffect(() => {
    if(!iata||iata.length<3) return;
    setFc("?"); setRaw("");
    const icao = IATA_TO_ICAO[iata.toUpperCase()] || iata.toUpperCase();
    fetch(`https://api.checkwx.com/metar/${icao}/decoded`, {
      headers: {"X-API-Key":"add2685cda494119a5465ec664852fed","Accept":"application/json"}
    })
      .then(r=>r.json())
      .then(data=>{
        const m = data?.data?.[0];
        if(!m) return;
        setRaw(m.raw_text||"");
        setFc(m.flight_category||calcFlightCategory(m.raw_text||""));
      })
      .catch(()=>setFc("?"));
  }, [iata]);
  return {fc, raw};
}

function simulateFlightState(icao24) {
  const now = Date.now();
  const seed  = Math.sin(now / 8000);
  const seed2 = Math.cos(now / 6000);
  const seed3 = Math.sin(now / 4000);

  // CN-KTB (020036) — CMN → VIL (Dakhla), position mi-chemin ~28.5°N 11.7°W
  if(icao24 === "020036") {
    const elapsed = (now % (135 * 60 * 1000)) / (135 * 60 * 1000);
    // Départ légèrement après mi-chemin pour varier
    const progress = 0.45 + elapsed * 0.1; // oscille entre 0.45 et 0.55
    const lat = 33.3675 + (23.7183 - 33.3675) * progress + seed * 0.05;
    const lon = -7.5900 + (-15.9320 - (-7.5900)) * progress + seed2 * 0.05;
    const cruiseAlt = 9144; // FL300
    const altM = cruiseAlt + seed * 80;
    const speed_ms = 220 + seed2 * 8;
    const heading = 200 + seed3 * 3; // Cap SSO vers Dakhla
    return {
      icao24,
      callsign:    "AJS07",
      country:     "Morocco",
      lat, lon,
      onGround:    false,
      heading,
      vertRate_ms: seed * 0.3,
      squawk:      "2342",
      lastContact: Math.floor(now / 1000),
      speed_kt:    Math.round(speed_ms * 1.94384),
      alt_ft:      Math.round(altM * 3.28084),
      flightLevel: Math.round(altM * 3.28084 / 100),
      simulated:   true,
    };
  }

  // CN-KTA (020035) — CMN → FEZ, position mi-chemin
  const elapsed = (now % (55 * 60 * 1000)) / (55 * 60 * 1000);
  const progress = 0.45 + elapsed * 0.1; // oscille entre 0.45 et 0.55
  const lat = 33.3675 + (33.9273 - 33.3675) * progress + seed * 0.03;
  const lon = -7.5900 + (-4.9778 - (-7.5900)) * progress + seed2 * 0.03;
  const cruiseAlt = 8534; // FL280
  const altM = cruiseAlt + seed * 80;
  const speed_ms = 225 + seed2 * 8;
  const heading = 72 + seed3 * 3; // ENE vers FEZ
  return {
    icao24:      icao24 || "020035",
    callsign:    "AJS03",
    country:     "Morocco",
    lat, lon,
    onGround:    false,
    heading,
    vertRate_ms: elapsed < 0.15 ? 8.5 : elapsed > 0.85 ? -7.2 : seed * 0.5,
    squawk:      "2341",
    lastContact: Math.floor(now / 1000),
    speed_kt:    Math.round(speed_ms * 1.94384),
    alt_ft:      Math.round(altM * 3.28084),
    flightLevel: Math.round(altM * 3.28084 / 100),
    simulated:   true,
  };
}

            <div style={{fontSize:10,color:C.slate}}>{ac.lat.toFixed(4)}N {Math.abs(ac.lon).toFixed(4)}W {ac.alt_ft?(" · "+ac.alt_ft.toLocaleString()+" ft"):""} {ac.speed_kt?(" · "+ac.speed_kt+" kt"):""} {ac.heading?(" · Cap "+Math.round(ac.heading)):""}</div>

        </div>
      )}
    </div>
  );

// ── Alerts ───────────────────────────────────────────────────────────────────
function computeAlerts(kpis, flights, maintData, aircraft) {
  const a=[];
  // Calculate real OTP from flights
  const volsDone=flights.filter(f=>f.status==="Termine");
  const otpScore=f=>f.delayMin<=0?100:f.delayMin<=15?85:f.delayMin<=30?70:f.delayMin<=45?50:25;
  const otp=volsDone.length>0?Math.round(volsDone.reduce((s,f)=>s+otpScore(f),0)/volsDone.length):kpis.otp||0;
  const delayVols=volsDone.filter(f=>f.delayMin>0);
  const delayMin=delayVols.length>0?Math.round(delayVols.reduce((s,f)=>s+f.delayMin,0)/delayVols.length):kpis.delayMin||0;
  if(otp<85)a.push({id:"otp",sev:"danger",msg:"OTP critique: "+otp+"% (seuil 85%)",icon:"⏰"});
  else if(otp<90)a.push({id:"otp",sev:"warn",msg:"OTP en baisse: "+otp+"%",icon:"⏰"});
  if(delayMin>30)a.push({id:"del",sev:"danger",msg:"Retards: "+delayMin+" min",icon:"⚠"});
  else if(delayMin>15)a.push({id:"del",sev:"warn",msg:"Retards: "+delayMin+" min",icon:"⚠"});
  const lfVal=volsDone.length>0?Math.round(volsDone.reduce((s,f)=>s+f.load,0)/volsDone.length):kpis.loadFactor||0;
  if(lfVal<70)a.push({id:"lf",sev:"warn",msg:"Load Factor: "+lfVal+"%",icon:"💺"});
  // Per-aircraft checks and MEL alerts
  const acList=aircraft&&aircraft.length>0?aircraft:[maintData||{}];
  acList.forEach(ac=>{
    const prefix=aircraft&&aircraft.length>1?"["+ac.immat+"] ":"";
    const id_prefix=ac.id||"ac";
    if((ac.nextCheckH||999)<50)a.push({id:id_prefix+"_achk",sev:"danger",msg:prefix+"A-Check dans "+(ac.nextCheckH||0)+"h",icon:"🔧"});
    else if((ac.nextCheckH||999)<100)a.push({id:id_prefix+"_achk",sev:"warn",msg:prefix+"A-Check dans "+(ac.nextCheckH||0)+"h",icon:"🔧"});
    if(ac.bCheckH&&ac.bCheckH<100)a.push({id:id_prefix+"_bchk",sev:"danger",msg:prefix+"B-Check dans "+ac.bCheckH+"h",icon:"🔩"});
    else if(ac.bCheckH&&ac.bCheckH<300)a.push({id:id_prefix+"_bchk",sev:"warn",msg:prefix+"B-Check dans "+ac.bCheckH+"h",icon:"🔩"});
    if(ac.cCheckH&&ac.cCheckH<200)a.push({id:id_prefix+"_cchk",sev:"danger",msg:prefix+"C-Check dans "+ac.cCheckH+"h",icon:"🛠"});
    else if(ac.cCheckH&&ac.cCheckH<500)a.push({id:id_prefix+"_cchk",sev:"warn",msg:prefix+"C-Check dans "+ac.cCheckH+"h",icon:"🛠"});
    (ac.mels||[]).forEach((m,i)=>{
      const sev=m.sev==="A"?"danger":m.sev==="B"?"danger":"warn";
      a.push({id:id_prefix+"_mel_"+i,sev,msg:prefix+"MEL Cat."+m.sev+" — "+m.sys+" ("+(m.mel||m.ref||"")+") · Exp: "+m.exp,icon:"🔧"});
    });
  });
  return a;
}

      <FHeader icon="✈" title="Preparation du vol" subtitle="Donnees planifiees avant depart" color="#0F1F3D"/>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {/* Aircraft selector */}
        {aircraft&&aircraft.length>0&&(
          <div>
            <FLabel>Avion</FLabel>
            <select value={acId} onChange={e=>setAcId(e.target.value)}
              style={{width:"100%",height:48,boxSizing:"border-box",background:C.bg,border:"1.5px solid "+C.gold,borderRadius:10,padding:"0 14px",color:C.text,fontSize:13,outline:"none",appearance:"none",fontWeight:700}}>

        <FGrid><FAirport label="Depart — Code IATA" value={from_} onChange={setFrom}/><FAirport label="Arrivee — Code IATA" value={to} onChange={setTo}/></FGrid>

        <FGrid><FField label="Depart prevu *" value={dep} onChange={setDep} type="time"/></FGrid>

        <FGrid>
          <FField label={"PAX (0-"+SIEGES+")"} value={pax} onChange={v=>setPax(String(Math.min(SIEGES,Math.max(0,Number(v)||0))))} type="number" min={0} max={SIEGES}/>
          <FCalc label="Remplissage" value={pax===''?'--':load+"%"} color={pax===''?C.border:load>=80?"#00936A":load>=60?"#D97706":"#DC2626"}/>

        <FSection title={"Carburant embarque — Capacite "+CAPA+" kg"} color="#0F1F3D"/>
        <FGrid>
          <FField label="Fuel depart (kg)" value={carbDep} onChange={setCDep} type="number" min={0} max={CAPA}/>

        <FGrid>
          <div>

            </select>

          <div>
            <FLabel>CM2 — Copilote</FLabel>
            <select value={cm2} onChange={e=>setCm2(e.target.value)}
              style={{width:"100%",height:48,boxSizing:"border-box",background:C.bg,border:"1.5px solid "+C.border,borderRadius:10,padding:"0 14px",color:cm2?C.text:C.slateL,fontSize:13,outline:"none",appearance:"none"}}>
              <option value="">-- Choisir --</option>
              {(crew||[]).filter(m=>m.role==="CM1"||m.role==="CM2").map(m=>(
                <option key={m.id} value={m.prenom+" "+m.nom}>{m.prenom} {m.nom}</option>
              ))}
            </select>
          </div>
        </FGrid>
        <div>
          <FLabel>CC — Hotesse / Steward</FLabel>
          <select value={cc} onChange={e=>setCc(e.target.value)}
            style={{width:"100%",height:48,boxSizing:"border-box",background:C.bg,border:"1.5px solid "+C.border,borderRadius:10,padding:"0 14px",color:cc?C.text:C.slateL,fontSize:13,outline:"none",appearance:"none"}}>
            <option value="">-- Choisir --</option>
            {(crew||[]).filter(m=>m.role==="CC").map(m=>(
              <option key={m.id} value={m.prenom+" "+m.nom}>{m.prenom} {m.nom}</option>
            ))}
          </select>
        </div>
        <FSubmit label="Planifier le vol" onClick={submit} saved={saved}/>
      </div>
    </Card>
  );
}


// ── Registre Equipage ────────────────────────────────────────────────────────
function FormEquipage({ crew, setCrew, saved: parentSaved }) {
  const [localSaved, setLocalSaved] = useState(false);
  const saved = localSaved;
  const triggerSaved = () => { setLocalSaved(true); setTimeout(()=>setLocalSaved(false),2500); };
  const ROLES = ["CM1","CM2","CC"];
  const [nom,setNom]       = useState("");
  const [prenom,setPrenom] = useState("");
  const [role,setRole]     = useState("CM1");
  const [licence,setLic]   = useState("");
  const [editing,setEditing] = useState(null); // id en cours d edition

  const addOrUpdate = () => {
    if (!nom.trim()||!prenom.trim()) { alert("Nom et prenom requis"); return; }
    if (editing !== null) {
      setCrew(c => c.map(m => m.id===editing
        ? {...m,nom:nom.trim(),prenom:prenom.trim(),role,licence:licence.trim()}
        : m));
      setEditing(null);
    } else {
      const newId = Math.max(0,...(crew||[]).map(m=>m.id))+1;
      setCrew(c => [...c, {id:newId,nom:nom.trim(),prenom:prenom.trim(),role,licence:licence.trim()}]);
    }
    setNom("");setPrenom("");setRole("CM1");setLic("");
    triggerSaved();
  };

  const startEdit = m => {
    setEditing(m.id); setNom(m.nom); setPrenom(m.prenom);
    setRole(m.role); setLic(m.licence||"");
  };

  const remove = id => setCrew(c => c.filter(m => m.id!==id));
  const cancel = () => { setEditing(null);setNom("");setPrenom("");setRole("CM1");setLic(""); };

  const roleColor = r => r==="CM1"?"#0F1F3D":r==="CM2"?"#0369A1":"#00936A";
  const roleBg    = r => r==="CM1"?"#E0E7FF":r==="CM2"?"#E0F2FE":"#D1FAE5";

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <Card accent="#0369A1">
        <FHeader icon="👨‍✈️" title={editing!==null?"Modifier membre":"Ajouter membre"} subtitle="Registre equipage CN-KTA" color="#0369A1"/>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <FGrid>
            <FField label="Nom *" value={nom} onChange={setNom}/>
            <FField label="Prenom *" value={prenom} onChange={setPrenom}/>
          </FGrid>
          <FGrid>
            <FSelect label="Role" value={role} onChange={setRole}
              options={ROLES.map(r=>({value:r,label:r==="CM1"?"CM1 — Commandant":r==="CM2"?"CM2 — Copilote":"CC — Hotesse"}))}/>
            <FField label="Licence / Matricule" value={licence} onChange={setLic}/>
          </FGrid>
          <div style={{display:"flex",gap:10}}>
            {editing!==null && (
              <button onClick={cancel}
                style={{flex:1,height:48,background:C.bg,border:"1.5px solid "+C.border,borderRadius:10,color:C.slate,fontSize:14,fontWeight:700,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
                Annuler
              </button>
            )}
            <button onClick={addOrUpdate}
              style={{flex:2,height:48,background:saved?"#00936A":"#DC2626",border:"none",borderRadius:10,color:"white",fontSize:14,fontWeight:700,cursor:"pointer",WebkitTapHighlightColor:"transparent",transition:"background 0.3s"}}>
              {saved?"✅ Enregistré":editing!==null?"Enregistrer modifications":"+ Ajouter"}
            </button>
          </div>
        </div>
      </Card>

      <div style={{background:"white",borderRadius:12,border:"1px solid "+C.border,overflow:"hidden"}}>
        <div style={{padding:"9px 14px",background:C.bg,borderBottom:"1px solid "+C.border,fontSize:10,fontWeight:700,color:C.slate,textTransform:"uppercase"}}>
          {(crew||[]).length} membres enregistres
        </div>
        {(crew||[]).length===0 && (
          <div style={{padding:20,textAlign:"center",color:C.slateL,fontSize:13}}>Aucun membre enregistre</div>
        )}
        {ROLES.map(r => {
          const members = (crew||[]).filter(m=>m.role===r);
          if (members.length===0) return null;
          return (
            <div key={r}>
              <div style={{padding:"6px 14px",background:roleBg(r),fontSize:9,fontWeight:800,color:roleColor(r),textTransform:"uppercase",letterSpacing:"0.1em"}}>
                {r==="CM1"?"Commandants de bord":r==="CM2"?"Officiers Pilotes de Ligne":"Hotesses / Stewards"}
              </div>
              {members.map((m,i)=>(
                <div key={m.id} style={{display:"flex",alignItems:"center",padding:"10px 14px",borderBottom:"1px solid "+C.border,gap:10}}>
                  <div style={{width:34,height:34,borderRadius:"50%",background:roleBg(r),flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:roleColor(r)}}>
                    {m.prenom[0]}{m.nom[0]}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13,color:C.text}}>{m.prenom} {m.nom}</div>
                    <div style={{fontSize:10,color:C.slate}}>{m.licence||"—"}</div>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>startEdit(m)}
                      style={{background:C.bg,border:"1px solid "+C.border,borderRadius:7,padding:"5px 10px",fontSize:11,color:C.slate,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
                      ✏
                    </button>
                    <button onClick={()=>remove(m.id)}
                      style={{background:"#FEE2E2",border:"1px solid #DC2626",borderRadius:7,padding:"5px 10px",fontSize:11,color:"#DC2626",cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
                      ✕
                    </button>
                  </div>
                </div>
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function FormMaint({ onSubmit, onResolveMel, maintData, aircraft, saved }) {
  const md=maintData||{};
  const initAc=aircraft&&aircraft.length>0?aircraft[0]:{};
  const [acId,setAcId]=useState(initAc.id||"");
  const [ttaf,setTtaf]=useState(String(initAc.ttaf||""));
  const [nextH,setNextH]=useState(String(initAc.nextCheckH||""));
  const [bCheckH,setBCheckH]=useState(String(initAc.bCheckH||""));
  const [cCheckH,setCCheckH]=useState(String(initAc.cCheckH||""));
  const [evtMoteur,setEvtMoteur]=useState(String(initAc.evtMoteur||""));
  const [mels,setMels]=useState(initAc.mels||[]);

  // Reload when aircraft selection changes
  useEffect(()=>{
    const ac=aircraft?.find(a=>a.id===acId)||{};
    setTtaf(String(ac.ttaf||""));
    setNextH(String(ac.nextCheckH||""));
    setBCheckH(String(ac.bCheckH||""));
    setCCheckH(String(ac.cCheckH||""));
    setEvtMoteur(String(ac.evtMoteur||""));
    setMels(ac.mels||[]);
  },[acId]);
  const [showMelForm,setShowMelForm]=useState(false);
  const [editIdx,setEditIdx]=useState(null);
  const [mSys,setMSys]=useState("");
  const [mMel,setMMel]=useState("");
  const [mExp,setMExp]=useState("");
  const [mSev,setMSev]=useState("B");
  const [showResolve,setShowResolve]=useState(false);
  const [resolveIdx,setResolveIdx]=useState(null);
  const [rDate,setRDate]=useState("");
  const [rTech,setRTech]=useState("");
  const [rAction,setRAction]=useState("");
  const [rOT,setROT]=useState("");
  const [resolveSaved,setResolveSaved]=useState(false);

  const openAdd=()=>{setMSys("");setMMel("");setMExp("");setMSev("B");setEditIdx(null);setShowMelForm(true);};
  const openEdit=(m,i)=>{setMSys(m.sys);setMMel(m.mel);setMExp(m.exp);setMSev(m.sev);setEditIdx(i);setShowMelForm(true);};
  const saveMel=()=>{
    if(!mSys.trim())return;
    const newMel={sys:mSys.trim(),mel:mMel.trim(),exp:mExp.trim(),sev:mSev};
    setMels(editIdx!==null?mels.map((m,i)=>i===editIdx?newMel:m):[...mels,newMel]);
    setShowMelForm(false);
  };
  const deleteMel=i=>setMels(mels.filter((_,idx)=>idx!==i));
  const openResolve=(m,i)=>{
    setResolveIdx(i);setRDate("");setRTech("");setRAction("");setROT("");
    setShowResolve(true);
  };
  const saveResolve=()=>{
    if(!rDate.trim()||!rTech.trim()||!rAction.trim()||!rOT.trim()){
      alert("Tous les champs sont obligatoires");return;
    }
    const ac=aircraft?.find(a=>a.id===acId)||aircraft?.[0];
    const mel=mels[resolveIdx];
    const resolved={
      ...mel,
      acId, acImmat:ac?.immat||"",
      dateResolution:rDate.trim(),
      technicien:rTech.trim().toUpperCase(),
      action:rAction.trim().toUpperCase(),
      ot:rOT.trim().toUpperCase(),
      resolvedAt:new Date().toISOString(),
    };
    // Add to melHist via onSubmit signal
    const newMels=mels.filter((_,idx)=>idx!==resolveIdx);
    setMels(newMels);
    setResolveSaved(true);
    setTimeout(()=>{setResolveSaved(false);setShowResolve(false);},2000);
    // Pass resolved MEL to parent via onSubmit
    if(onResolveMel) onResolveMel(resolved);
  };
  const sevColor=s=>s==="A"?"#DC2626":s==="B"?"#D97706":"#64748B";
  const sevBg=s=>s==="A"?"#FEE2E2":s==="B"?"#FEF3C7":"#F1F5F9";

  const submit=()=>{
    const volsDone=Number(md.volsDone||0);
    const evt=Number(evtMoteur)||0;
    const fiabCalc=volsDone>0?Math.round(((volsDone-evt)/volsDone)*1000)/10:0;
    onSubmit({acId,ttaf:Number(ttaf)||0,melCount:mels.length,nextCheckH:Number(nextH)||0,
      bCheckH:Number(bCheckH)||0,cCheckH:Number(cCheckH)||0,
      evtMoteur:evt,fiabMoteurs:fiabCalc,mels});
  };

  return (
    <Card accent="#00936A">
      <FHeader icon="🔧" title="Maintenance CAMO" subtitle="Rapport hebdomadaire CAMO" color="#00936A"/>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {aircraft&&aircraft.length>0&&(
          <div>
            <FLabel>Avion</FLabel>
            <select value={acId} onChange={e=>setAcId(e.target.value)}
              style={{width:"100%",height:48,boxSizing:"border-box",background:C.bg,border:"1.5px solid #00936A",borderRadius:10,padding:"0 14px",color:C.text,fontSize:13,fontWeight:700,outline:"none",appearance:"none"}}>
              {aircraft.map(a=><option key={a.id} value={a.id}>{a.immat} · {a.type}</option>)}
            </select>
          </div>
        )}
        <FSection title="Cellule" color="#00936A"/>
        <FGrid>
          <FField label="TTAF (heures)" value={ttaf} onChange={setTtaf} type="number" min={0}/>
          <FCalc label="Statut cellule" value="En service" color={C.emerald}/>
        </FGrid>
        <FSection title="Visites périodiques" color="#00936A"/>
        <FGrid>
          <FField label="A-Check dans (h)" value={nextH} onChange={setNextH} type="number" min={0}/>
          <FCalc label="Statut A-Check" value={!nextH||nextH==="0"?"--":Number(nextH)<50?"URGENT":Number(nextH)<100?"Proche":"OK"} color={!nextH||nextH==="0"?C.slate:Number(nextH)<50?C.danger:Number(nextH)<100?C.warn:C.emerald}/>
        </FGrid>
        <FGrid>
          <FField label="B-Check dans (h)" value={bCheckH} onChange={setBCheckH} type="number" min={0}/>
          <FCalc label="Statut B-Check" value={!bCheckH||bCheckH==="0"?"--":Number(bCheckH)<100?"URGENT":Number(bCheckH)<300?"Proche":"OK"} color={!bCheckH||bCheckH==="0"?C.slate:Number(bCheckH)<100?C.danger:Number(bCheckH)<300?C.warn:C.emerald}/>
        </FGrid>
        <FGrid>
          <FField label="C-Check dans (h)" value={cCheckH} onChange={setCCheckH} type="number" min={0}/>
          <FCalc label="Statut C-Check" value={!cCheckH||cCheckH==="0"?"--":Number(cCheckH)<200?"URGENT":Number(cCheckH)<500?"Proche":"OK"} color={!cCheckH||cCheckH==="0"?C.slate:Number(cCheckH)<200?C.danger:Number(cCheckH)<500?C.warn:C.emerald}/>
        </FGrid>
        <FSection title="Fiabilite" color="#00936A"/>
        <FGrid>
          <FField label="Evenements moteur" value={evtMoteur} onChange={setEvtMoteur} type="number" min={0}/>
          <FCalc label="Fiabilite calculee"
            value={(()=>{
              const v=Number(md.volsDone||0);
              const e=Number(evtMoteur)||0;
              return v>0?(Math.round(((v-e)/v)*1000)/10)+"%":"--";
            })()}
            color={(()=>{
              const v=Number(md.volsDone||0);
              const e=Number(evtMoteur)||0;
              const f=v>0?((v-e)/v)*100:100;
              return f>=99.5?C.emerald:f>=98?C.warn:C.danger;
            })()}
          />
        </FGrid>
        <FSection title={"MEL actifs ("+mels.length+")"} color="#00936A"/>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {mels.length===0&&<div style={{textAlign:"center",color:C.slateL,fontSize:12,padding:"8px 0"}}>Aucun MEL — appuyez sur + pour ajouter</div>}
          {mels.map((m,i)=>(
            <div key={i} style={{background:C.bg,borderRadius:10,padding:"10px 12px",display:"flex",gap:10,alignItems:"center"}}>
              <span style={{background:sevBg(m.sev),color:sevColor(m.sev),padding:"2px 8px",borderRadius:8,fontSize:10,fontWeight:700,flexShrink:0}}>Cat.{m.sev}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.sys}</div>
                <div style={{fontSize:10,color:C.slate}}>{m.mel}{m.exp?" · Exp: "+m.exp:""}</div>
              </div>
              <div style={{display:"flex",gap:6,flexShrink:0}}>
                <button onClick={()=>openEdit(m,i)}
                  style={{background:"white",border:"1.5px solid "+C.border,borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",color:C.slate,WebkitTapHighlightColor:"transparent"}}>
                  ✏ Modifier
                </button>
                <button onClick={()=>openResolve(m,i)}
                  style={{background:"#00936A",border:"none",borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,color:"white",cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
                  ✓ Résoudre
                </button>
              </div>
            </div>
          ))}
          <button onClick={openAdd}
            style={{height:42,background:"white",border:"1.5px dashed #00936A",borderRadius:10,color:"#00936A",fontSize:13,fontWeight:700,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
            + Ajouter un MEL
          </button>
        </div>

        <FSubmit label="Enregistrer Maintenance" onClick={submit} saved={saved}/>
      </div>

      {showResolve&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:300,display:"flex",alignItems:"flex-end"}}>
          <div style={{background:"white",width:"100%",borderRadius:"16px 16px 0 0",padding:"20px 16px 32px",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{fontWeight:800,fontSize:16,color:C.navy,marginBottom:4}}>Résolution MEL</div>
            <div style={{fontSize:12,color:C.slate,marginBottom:16}}>{mels[resolveIdx]?.sys||""}</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {[["DATE DE RÉSOLUTION",rDate,setRDate,"text","JJ/MM/AAAA"],
                ["TECHNICIEN",rTech,setRTech,"text","NOM PRÉNOM"],
                ["ACTION EFFECTUÉE",rAction,setRAction,"text","DESCRIPTION DES TRAVAUX"],
                ["N° ORDRE DE TRAVAIL",rOT,setROT,"text","OT-XXXXX"]
              ].map(([lbl,val,setter,type,ph])=>(
                <div key={lbl}>
                  <div style={{fontSize:11,fontWeight:700,color:C.slate,marginBottom:4}}>{lbl} *</div>
                  <input value={val} onChange={e=>setter(e.target.value.toUpperCase())}
                    placeholder={ph} autoComplete="off"
                    style={{width:"100%",height:44,background:C.bg,border:"1.5px solid "+C.border,borderRadius:10,padding:"0 12px",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                </div>
              ))}
              <div style={{display:"flex",gap:10,marginTop:6}}>
                <button onClick={()=>setShowResolve(false)}
                  style={{flex:1,height:46,background:"white",border:"1.5px solid "+C.border,borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer",color:C.slate}}>
                  Annuler
                </button>
                <button onClick={saveResolve}
                  style={{flex:2,height:46,background:resolveSaved?"#00936A":"#DC2626",border:"none",borderRadius:10,fontSize:14,fontWeight:700,color:"white",cursor:"pointer",transition:"background 0.3s"}}>
                  {resolveSaved?"✅ Enregistré":"✓ Confirmer résolution"}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}
      {showMelForm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:300,display:"flex",alignItems:"flex-end"}}>
          <div style={{background:"white",width:"100%",borderRadius:"16px 16px 0 0",padding:"20px 16px 32px"}}>
            <div style={{fontWeight:800,fontSize:16,color:C.navy,marginBottom:16}}>{editIdx!==null?"Modifier MEL":"Nouveau MEL"}</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:C.slate,marginBottom:4}}>SYSTÈME</div>
                <input value={mSys} onChange={e=>setMSys(e.target.value)}
                  style={{width:"100%",height:44,background:C.bg,border:"1.5px solid "+C.border,borderRadius:10,padding:"0 12px",fontSize:13,outline:"none"}}/>
              </div>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:C.slate,marginBottom:4}}>RÉFÉRENCE MEL</div>
                <input value={mMel} onChange={e=>setMMel(e.target.value)}
                  style={{width:"100%",height:44,background:C.bg,border:"1.5px solid "+C.border,borderRadius:10,padding:"0 12px",fontSize:13,outline:"none"}}/>
              </div>
              <div style={{display:"flex",gap:10}}>

function FormSafety({ onSubmit, flights, saved }) {
  // Get terminated flights of current week
  const now=new Date();
  const day=now.getDay()||7;
  const monday=new Date(now);monday.setDate(now.getDate()-day+1);monday.setHours(0,0,0,0);
  const sunday=new Date(monday);sunday.setDate(monday.getDate()+6);sunday.setHours(23,59,59,999);
  const weekFlights=flights.filter(f=>f.status==="Termine"&&f.date&&new Date(f.date)>=monday&&new Date(f.date)<=sunday);

  const [volNum,setVolNum]=useState("");
  const [approche,setApproche]=useState(false);
  const [tcas,setTcas]=useState(false);
  const [gpws,setGpws]=useState(false);
  const [hardLanding,setHardLanding]=useState(false);
  const [safa,setSafa]=useState(false);

  const reset=()=>{setVolNum("");setApproche(false);setTcas(false);setGpws(false);setHardLanding(false);setSafa(false);};

  const submit=()=>{
    if(!volNum)return;
    const f=flights.find(f=>f.num===volNum);
    onSubmit({
      num:volNum, date:f?.date||new Date().toISOString().slice(0,10),
      from:f?.from||"", to:f?.to||"",
      approche,tcas,gpws,hardLanding,safa,
      timestamp:new Date().toISOString()
    });
    reset();
  };

  const Check=({label,value,onChange,color="#DC2626"})=>(
    <div onClick={()=>onChange(!value)}
      style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:value?color+"15":"white",
        border:"1.5px solid "+(value?color:C.border),borderRadius:10,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
      <div style={{width:22,height:22,borderRadius:6,border:"2px solid "+(value?color:C.border),
        background:value?color:"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        {value&&<span style={{color:"white",fontSize:14,fontWeight:800}}>✓</span>}
      </div>
      <span style={{fontSize:13,fontWeight:600,color:value?color:C.text}}>{label}</span>
    </div>
  );

  return (
    <Card accent="#DC2626">
      <FHeader icon="🛡" title="Événements Sécurité" subtitle="Rapport post-vol CN-KTA" color="#DC2626"/>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <FSection title="Numéro de vol" color="#DC2626"/>
        <select value={volNum} onChange={e=>setVolNum(e.target.value)}
          style={{width:"100%",height:48,background:C.bg,border:"1.5px solid "+C.border,borderRadius:10,padding:"0 14px",fontSize:14,color:C.text,outline:"none"}}>
          <option value="">-- Sélectionner un vol --</option>
          {weekFlights.map(f=>(
            <option key={f.num} value={f.num}>{f.num} — {f.from}→{f.to} ({f.date?.slice(8)}/{f.date?.slice(5,7)})</option>
          ))}
        </select>
        {weekFlights.length===0&&<div style={{textAlign:"center",color:C.slateL,fontSize:12}}>Aucun vol terminé cette semaine</div>}

        <FSection title="Événements" color="#DC2626"/>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <Check label="Approche instable" value={approche} onChange={setApproche}/>
          <Check label="TCAS RA" value={tcas} onChange={setTcas}/>
          <Check label="GPWS Warning" value={gpws} onChange={setGpws}/>
          <Check label="Hard Landing" value={hardLanding} onChange={setHardLanding}/>
          <Check label="Inspection SAFA" value={safa} onChange={setSafa} color="#7C3AED"/>
        </div>

        <FSubmit label="Enregistrer événements" onClick={submit} saved={saved}/>
      </div>
    </Card>
  );
}

function FormFin({ onSubmit, saved }) {
  const MOIS=["Janvier","Fevrier","Mars","Avril","Mai","Juin","Juillet","Aout","Septembre","Octobre","Novembre","Decembre"];
  const [mois,setMois]=useState("Juin");
  const [rev,setRev]=useState("");
  const [cout,setCout]=useState("");
  const [cCarbu,setCCarbu]=useState("");

  const revN=Number(rev)||0;const coutN=Number(cout)||0;
  const marge=revN>0?Math.round((1-coutN/revN)*100):null;

  const submit=()=>{
    if(!rev||!cout){alert("Revenus et couts requis");return;}
    onSubmit({mois,revenus:revN,couts:coutN,coutCarbu:Number(cCarbu)||0,
      revenuVol:revN>0?Math.round(revN/35):0,billetMoyen:revN>0?Math.round(revN/(35*18)):0,marge:marge||0});
  };
  return (
    <Card accent="#7C3AED">
      <FHeader icon="💰" title="Finances" subtitle="Rapport mensuel Comptabilite" color="#7C3AED"/>

        <FSelect label="Mois" value={mois} onChange={setMois} options={MOIS.map(m=>({value:m,label:m}))}/>

        <FGrid>
          <FField label="Cout carburant (MAD)" value={cCarbu} onChange={setCCarbu} type="number" min={0}/>
          <FCalc label="Marge brute" value={marge!==null?marge+"%":"--"} color={marge!==null?marge>0?"#00936A":marge===0?"#D97706":"#DC2626":"#94A3B8"}/>

        <FSubmit label="Enregistrer Finances" onClick={submit} saved={saved}/>

function FormAircraft({ aircraft, onUpdate, saved }) {
  const [sel,setSel]=useState(aircraft&&aircraft.length>0?aircraft[0].id:"new");
  const [immat,setImmat]=useState("");
  const [type,setType]=useState("");
  const [sieges,setSieges]=useState("");
  const [capa,setCapa]=useState("");
  const [icao24,setIcao24]=useState(()=>aircraft&&aircraft.length>0?aircraft[0].icao24||"":"");
  const [msg,setMsg]=useState("");
  const [localSaved,setLocalSaved]=useState(false);

  React.useEffect(()=>{
    if(sel==="new"){setImmat("");setType("");setSieges("18");setCapa("5700");setIcao24("");}
    else{
      const ac=aircraft.find(a=>a.id===sel);
      if(ac){setImmat(ac.immat||"");setType(ac.type||"");setSieges(String(ac.sieges||18));setCapa(String(ac.capa||5700));setIcao24(ac.icao24||"");}
    }
  },[sel]);

  const save=()=>{
    if(!immat.trim()||!type.trim()){alert("Immatriculation et type requis");return;}
    if(sel==="new"){
      const newAc={id:"AC"+Date.now(),immat:immat.trim().toUpperCase(),type:type.trim(),sieges:Number(sieges)||18,capa:Number(capa)||5700,icao24:icao24.trim(),ttaf:0,nextCheckH:null,bCheckH:null,cCheckH:null,evtMoteur:0,fiabMoteurs:100,mels:[]};
      onUpdate([...aircraft,newAc]);
      setMsg("Avion ajouté ✅");
    } else {
      onUpdate(aircraft.map(a=>a.id===sel?{...a,immat:immat.trim().toUpperCase(),type:type.trim(),sieges:Number(sieges)||18,capa:Number(capa)||5700,icao24:icao24.trim()}:a));
      setMsg("Avion mis à jour ✅");
    }
    setTimeout(()=>{setMsg("");setLocalSaved(false);},3000);
    setLocalSaved(true);
  };

  const del=()=>{
    if(aircraft.length<=1){alert("Impossible de supprimer le seul avion");return;}
    if(window.confirm("Supprimer "+immat+" ?")){
      onUpdate(aircraft.filter(a=>a.id!==sel));
      setSel(aircraft.find(a=>a.id!==sel)?.id||"new");
    }
  };

  return (
    <Card accent="#0369A1">
      <FHeader icon="🛩" title="Gestion de la flotte" subtitle="Ajouter ou modifier un avion" color="#0369A1"/>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div>
          <FLabel>Sélectionner un avion</FLabel>
          <select value={sel} onChange={e=>setSel(e.target.value)}
            style={{width:"100%",height:48,boxSizing:"border-box",background:C.bg,border:"1.5px solid "+C.border,borderRadius:10,padding:"0 14px",color:C.text,fontSize:13,outline:"none",appearance:"none"}}>
            {aircraft.map(a=><option key={a.id} value={a.id}>{a.immat} · {a.type}</option>)}
            <option value="new">➕ Nouvel avion</option>
          </select>
        </div>
        <FGrid>
          <FField label="Immatriculation *" value={immat} onChange={v=>setImmat(v.toUpperCase())}/>
          <FField label="Type *" value={type} onChange={setType}/>
        </FGrid>
        <FGrid>
          <FField label="Nombre de sièges" value={sieges} onChange={setSieges} type="number" min={1} max={999}/>
          <FField label="Capacité carbu. (kg)" value={capa} onChange={setCapa} type="number" min={0}/>
        </FGrid>
        <FField label="Code ICAO24 (transpondeur)" value={icao24} onChange={setIcao24}/>
        {/* Summary of existing fleet */}
        {aircraft.length>0&&(
          <Card>
            <SectionTitle>Flotte actuelle</SectionTitle>
            {aircraft.map((a,i)=>(
              <div key={a.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<aircraft.length-1?"1px solid "+C.border:"none"}}>
                <span style={{fontSize:20}}>🛩</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13,color:C.navy}}>{a.immat}</div>
                  <div style={{fontSize:11,color:C.slate}}>{a.type} · {a.sieges} sièges · {a.capa} kg</div>
                </div>
                <span style={{fontSize:10,color:C.slateL,fontFamily:"monospace"}}>{a.icao24||"--"}</span>
              </div>
            ))}
          </Card>
        )}
        {msg&&<div style={{background:"#D1FAE5",border:"1px solid #00936A",borderRadius:10,padding:"10px 14px",color:"#065F46",fontWeight:700,fontSize:13}}>{msg}</div>}
        <div style={{display:"flex",gap:10}}>
          {sel!=="new"&&aircraft.length>1&&(
            <button onClick={del} style={{flex:1,height:48,background:"#FEE2E2",border:"1.5px solid #DC2626",borderRadius:10,color:"#DC2626",fontSize:13,fontWeight:700,cursor:"pointer"}}>🗑 Supprimer</button>
          )}
          <button onClick={save} style={{flex:2,height:48,background:localSaved?"#00936A":"#DC2626",border:"none",borderRadius:10,color:"white",fontSize:14,fontWeight:700,cursor:"pointer",transition:"background 0.3s"}}>
            {localSaved?"✅ Enregistré":sel==="new"?"➕ Ajouter":"💾 Enregistrer"}
          </button>
        </div>
      </div>
    </Card>
  );
}

function ScreenForms({ onSubmitVol, onSubmitMaint, onSubmitFin, onSubmitSafety, onReset, flights, crew, setCrew, maintData, finData, kpis, dismissed, safetyData, onImport, aircraft, onUpdateAircraft, melHist, setMelHist }) {
  const [active,setActive]=useState("vol");
  const [saved,setSaved]=useState(false);
  const [showSat,setShowSat]=useState(false);
  const ok=fn=>d=>{fn(d);setSaved(true);setTimeout(()=>setSaved(false),2500);};

  const doExport=()=>{
    const data={
      version:"1.0",
      exportDate:new Date().toISOString(),
      flights,
      maintData,
      crew,
      finData,
      kpis,
      dismissed,
      safetyData,
    };
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="afrijet_backup_"+new Date().toISOString().slice(0,10)+".json";
    a.click();
    URL.revokeObjectURL(url);
    // Save last backup date
    localStorage.setItem("afrijet_last_backup", new Date().toISOString());
  };

  // Compute days since last backup
  const lastBackup=localStorage.getItem("afrijet_last_backup");
  const daysSince=lastBackup?Math.floor((Date.now()-new Date(lastBackup).getTime())/(1000*60*60*24)):null;

  const doImport=()=>{
    const input=document.createElement("input");
    input.type="file";
    input.accept=".json";
    input.onchange=e=>{
      const file=e.target.files[0];
      if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const data=JSON.parse(ev.target.result);
          if(data&&onImport){
            onImport(data);
            setSaved(true);
            setTimeout(()=>setSaved(false),2500);
          }
        }catch(err){alert("Fichier invalide — vérifiez que c'est un backup Afrijet.");}
      };
      reader.readAsText(file);
    };
    input.click();
  };

  const FORMS=[
    {id:"vol",   icon:"✈",  label:"Vol",         color:"#0F1F3D"},
    {id:"maint", icon:"🔧", label:"Maintenance",  color:"#00936A"},
    {id:"secu",  icon:"🛡", label:"Sécurité",     color:"#DC2626"},
    {id:"fin",   icon:"💰", label:"Finances",     color:"#7C3AED"},
    {id:"crew",  icon:"👨‍✈️", label:"Equipage",     color:"#0369A1"},
    {id:"avion", icon:"🛩", label:"Avion",        color:"#0369A1"},
  ];
  const f=FORMS.find(x=>x.id===active);
  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <Card accent="#0F1F3D">
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:44,height:44,borderRadius:10,background:"#0F1F3D",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>📝</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:15,color:C.navy}}>Formulaires de saisie</div>
            <div style={{fontSize:11,color:C.slate}}>Saisie par departement</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:10}}>
          <button onClick={doExport}
            style={{flex:1,height:36,background:"#D1FAE5",border:"1.5px solid #00936A",borderRadius:8,color:"#00936A",fontSize:11,fontWeight:700,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
            📥 Exporter
          </button>
          <button onClick={doImport}
            style={{flex:1,height:36,background:"#DBEAFE",border:"1.5px solid #0369A1",borderRadius:8,color:"#0369A1",fontSize:11,fontWeight:700,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
            📤 Importer
          </button>
          <button onClick={onReset}
            style={{flex:1,height:36,background:"#FEE2E2",border:"1.5px solid #DC2626",borderRadius:8,color:"#DC2626",fontSize:11,fontWeight:700,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
            🗑 Reset
          </button>
        </div>
      </Card>
      {saved&&(
        <div style={{padding:"12px 16px",borderRadius:10,fontSize:13,fontWeight:700,textAlign:"center",background:"#D1FAE5",color:"#00936A",border:"1px solid #00936A"}}>
          ✅ Données enregistrées
        </div>
      )}
      {(()=>{
        if(daysSince===null) return (
          <div style={{padding:"10px 14px",borderRadius:10,fontSize:12,background:"#FEF3C7",border:"1px solid #D97706",color:"#92400E",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>💾</span>
            <span><b>Aucun backup effectué</b> — pensez à exporter vos données</span>
          </div>
        );
        if(daysSince===0) return (
          <div style={{padding:"10px 14px",borderRadius:10,fontSize:12,background:"#D1FAE5",border:"1px solid #00936A",color:"#065F46",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>✅</span>
            <span><b>Backup du jour effectué</b> — données sécurisées</span>
          </div>
        );
        if(daysSince<=3) return (
          <div style={{padding:"10px 14px",borderRadius:10,fontSize:12,background:"#FEF3C7",border:"1px solid #D97706",color:"#92400E",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>⚠️</span>
            <span><b>Dernier backup il y a {daysSince} jour{daysSince>1?"s":""}</b> — pensez à exporter</span>
          </div>
        );
        return (
          <div style={{padding:"10px 14px",borderRadius:10,fontSize:12,background:"#FEE2E2",border:"1px solid #DC2626",color:"#991B1B",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>🚨</span>
            <span><b>Dernier backup il y a {daysSince} jours</b> — exportez vos données maintenant !</span>

            <div style={{fontSize:16,marginBottom:2}}>{fm.icon}</div>

                <div style={{color:"white",fontWeight:800,fontSize:14}}>📋 Formulaire Satisfaction</div>
                <div style={{color:"#A0720A",fontSize:10}}>Afrijet Sahara</div>
              </div>
              <button onClick={()=>setShowSat(false)}

                Fermer
              </button>
            </div>
              <div style={{padding:"10px 16px",background:"#0A1628",borderBottom:"1px solid rgba(255,255,255,.1)",flexShrink:0}}>
                <button onClick={()=>{
                  if(!window.jspdf){alert("jsPDF non charge. Verifiez votre connexion.");return;}
                  try {
                    const {jsPDF} = window.jspdf;
                    const doc = new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
                    const W=210, H=297, M=15, CW=W-2*M;
                    const NAVY=[15,31,61], GOLD=[160,114,10], EMERALD=[0,147,106];
                    const SLATE=[100,116,139], RED=[220,38,38], BLUE=[29,78,216];
                    const PURPLE=[124,58,237], WHITE=[255,255,255], LIGHT=[238,242,248];
                    // Header
                    doc.setFillColor(...NAVY);doc.rect(0,0,W,28,"F");
                    doc.setFillColor(...GOLD);doc.rect(0,28,W,1.5,"F");
                    doc.addImage(LOGO_B64,"JPEG",M,4,30,10);
                    doc.setTextColor(...WHITE);doc.setFont("helvetica","bold");doc.setFontSize(14);
                    doc.text("Enquête de Satisfaction Passager",M+35,12);
                    doc.setFont("helvetica","normal");doc.setFontSize(8);
                    doc.setTextColor(148,163,184);
                    doc.text("EMB 135  ·  CN-KTA  ·  Votre avis améliore nos services",M+35,18);
                    let y=36;
                    // Info row
                    doc.setFillColor(...LIGHT);doc.rect(M,y,CW,10,"F");
                    const fields=[["N° Vol",0.18],["Date",0.18],["Route",0.22],["Classe",0.15],["Siège",0.13],["CM1",0.14]];
                    let fx=M;
                    fields.forEach(([lbl,w])=>{
                      const fw=CW*w;
                      doc.setTextColor(...SLATE);doc.setFont("helvetica","bold");doc.setFontSize(6.5);
                      doc.text(lbl.toUpperCase(),fx+2,y+4);
                      doc.setDrawColor(148,163,184);doc.setLineWidth(0.3);
                      doc.line(fx+2,y+8,fx+fw-2,y+8);
                      fx+=fw;
                    });
                    y+=14;
                    // Section helper
                    const section=(title,r,g,b)=>{
                      if(y>260){doc.addPage();y=15;}
                      doc.setFillColor(r,g,b);doc.rect(M,y,CW,7,"F");
                      doc.setTextColor(...WHITE);doc.setFont("helvetica","bold");doc.setFontSize(8);
                      doc.text("  "+title.toUpperCase(),M+2,y+5);
                      y+=10;
                    };
                    const ratingRow=(label,sublabel="")=>{
                      if(y>268){doc.addPage();y=15;}
                      doc.setFillColor(248,250,252);doc.rect(M,y,CW,8,"F");
                      doc.setDrawColor(221,227,237);doc.setLineWidth(0.2);doc.rect(M,y,CW,8,"S");
                      doc.setTextColor(...NAVY);doc.setFont("helvetica","bold");doc.setFontSize(8.5);
                      doc.text(label,M+3,y+4);
                      if(sublabel){doc.setFont("helvetica","normal");doc.setFontSize(6.5);doc.setTextColor(...SLATE);doc.text(sublabel,M+3,y+7);}
                      for(let i=0;i<5;i++){

function ScreenOps({ flights, safetyData, onUpdateFlight }) {
  const [edit,setEdit]=useState(null);
  const [search,setSearch]=useState("");
  const [filterStatus,setFilterStatus]=useState("Tous");
  const sBg=s=>s==="Termine"?C.emeraldL:s==="En vol"?C.goldL:s==="Annule"?C.dangerL:C.bg;
  const sTx=s=>s==="Termine"?C.emeraldD:s==="En vol"?C.gold:s==="Annule"?C.danger:C.slate;
  const sIc=s=>s==="Termine"?"✓":s==="En vol"?"✈":s==="Annule"?"✗":"○";
  const getSecEvents=num=>(safetyData||[]).filter(e=>e.num===num);

  // Filter flights
  const filtered=flights.filter(f=>{
    const q=search.trim().toUpperCase();
    if(q){
      const dateShort=f.date?f.date.slice(8)+"/"+f.date.slice(5,7):"";
      const route=(f.from||"")+"-"+(f.to||"");
      const match=(f.num||"").includes(q)||
        route.includes(q)||
        (f.from||"").includes(q)||
        (f.to||"").includes(q)||
        (f.date||"").includes(q)||
        dateShort.includes(q)||
        (f.cm1||"").toUpperCase().includes(q);
      if(!match)return false;
    }
    if(filterStatus!=="Tous"&&f.status!==filterStatus)return false;
    return true;
  });

  const calcEdit=ef=>{
    if(!ef)return{};
    let delayMin=0;
    if(ef.arr&&ef.arrReal){
      const [ph,pm]=ef.arr.split(":").map(Number);
      const [rh,rm]=ef.arrReal.split(":").map(Number);
      const diff=(rh*60+rm)-(ph*60+pm);
      if(diff>15)delayMin=diff;
    }
    let consomme=0,consoH=0,fuelPct=ef.fuelPct||0;
    if(ef.carbDep>0&&ef.carbArr>0){
      consomme=ef.carbDep-ef.carbArr;
      fuelPct=Math.round(ef.carbArr/5700*100);
      if(ef.depReal&&ef.arrReal){
        const [dh,dm]=ef.depReal.split(":").map(Number);
        const [ah,am]=ef.arrReal.split(":").map(Number);
        const h=((ah*60+am)-(dh*60+dm))/60;
        if(h>0)consoH=Math.round(consomme/h);
      }
    }
    // Duration
    let dureeMin=0;
    const dep2=ef.depReal||ef.dep, arr2=ef.arrReal||ef.arr;
    if(dep2&&arr2){
      const [dh,dm]=dep2.split(":").map(Number);
      const [ah,am]=arr2.split(":").map(Number);
      const diff=(ah*60+am)-(dh*60+dm);
      if(diff>0) dureeMin=diff;
    }
    return{delayMin,consomme,consoH,fuelPct,nps:ef.nps||0,dureeMin};
  };

  const doUpdate=()=>{
    if(!edit)return;
    const c=calcEdit(edit);
    onUpdateFlight({...edit,load:Math.round(edit.pax/18*100),...c});
    setEdit(null);
  };

  const enVol=flights.filter(f=>f.status==="En vol");
  const done=flights.filter(f=>f.status==="Termine");
  const planned=flights.filter(f=>f.status==="Planifie");

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {edit&&(
        <div style={{position:"fixed",inset:0,zIndex:400,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"flex-end"}}>
          <div style={{background:"white",width:"100%",borderRadius:"20px 20px 0 0",padding:"20px 16px 36px",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
              <div>
                <div style={{fontWeight:800,fontSize:17,color:C.navy}}>{edit.num}</div>
                <div style={{fontSize:12,color:C.slate}}>{edit.from} vers {edit.to} | {edit.dep} - {edit.arr}</div>
              </div>
              <button onClick={()=>setEdit(null)} style={{background:"none",border:"none",fontSize:22,color:C.slate,cursor:"pointer"}}>x</button>
            </div>
            <div style={{marginBottom:16}}>
              <FLabel>Statut</FLabel>
              <div style={{display:"flex",gap:8}}>
                {["Planifie","En vol","Termine","Annule"].map(s=>(
                  <button key={s} onClick={()=>setEdit({...edit,status:s})}
                    style={{flex:1,padding:"9px 4px",borderRadius:9,border:"1.5px solid",fontSize:10,fontWeight:700,cursor:"pointer",WebkitTapHighlightColor:"transparent",borderColor:edit.status===s?sTx(s):C.border,background:edit.status===s?sBg(s):"white",color:edit.status===s?sTx(s):C.slate}}>
                    {sIc(s)} {s}
                  </button>
                ))}
              </div>
            </div>
            {(edit.status==="En vol"||edit.status==="Termine")&&(
              <div>
                <div style={{fontSize:10,fontWeight:700,color:C.gold,textTransform:"uppercase",marginBottom:8}}>Au decollage</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                  <div>
                    <FLabel>Decollage reel</FLabel>
                    <input type="time" value={edit.depReal||""} onChange={e=>setEdit({...edit,depReal:e.target.value})}
                      style={{width:"100%",height:48,borderRadius:10,border:"1.5px solid "+C.border,padding:"0 12px",fontSize:14,outline:"none",background:C.bg,boxSizing:"border-box"}}/>
                  </div>

function LineChart({data, color, target, maxVal, minVal, unit, fmtVal}) {
  const fmt=fmtVal||(v=>v);
  const W=300, H=90, padL=28, padR=8, padT=10, padB=20;
  const cW=W-padL-padR, cH=H-padT-padB;
  const pts = data.filter(d=>d.val!==null);
  if(pts.length<2) return (
    <div style={{textAlign:"center",padding:"20px",color:C.slateL,fontSize:12}}>
      Donnees insuffisantes (min. 2 semaines)
    </div>
  );
  const vals = pts.map(p=>p.val);
  const lo = minVal!==undefined ? minVal : Math.max(0,Math.min(...vals)-10);
  const hi = maxVal!==undefined ? maxVal : Math.max(...vals)+10;
  const range = hi-lo||1;
  const xS = i => padL + (i/(pts.length-1))*cW;
  const yS = v => padT + cH - ((v-lo)/range)*cH;
  const pathD = pts.map((p,i)=>(i===0?"M":"L")+xS(i).toFixed(1)+","+yS(p.val).toFixed(1)).join(" ");
  const areaD = pathD+" L"+xS(pts.length-1).toFixed(1)+","+(padT+cH)+" L"+padL.toFixed(1)+","+(padT+cH)+" Z";
  const ty = target!==undefined ? yS(Math.min(hi,Math.max(lo,target))) : null;
  return (
    <svg width="100%" viewBox={"0 0 "+W+" "+H} style={{display:"block",overflow:"visible"}}>
      {[0,0.5,1].map((t,i)=>{
        const yy=padT+cH*t, lv=Math.round(hi-t*(hi-lo));
        return <g key={i}>
          <line x1={padL} y1={yy} x2={W-padR} y2={yy} stroke={C.border} strokeWidth={0.5} strokeDasharray="3,3"/>
          <text x={padL-3} y={yy+3} textAnchor="end" fontSize={7} fill={C.slateL}>{fmt(lv)}</text>
        </g>;
      })}
      {ty!=null && <g>
        <line x1={padL} y1={ty} x2={W-padR} y2={ty} stroke={color} strokeWidth={0.8} strokeDasharray="3,2" opacity={0.45}/>
        <text x={W-padR+2} y={ty+3} fontSize={6} fill={color} opacity={0.6}>Obj</text>
      </g>}
      <path d={areaD} fill={color} fillOpacity={0.07}/>
      <path d={pathD} fill="none" stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=>{
        const isLast = i===pts.length-1;
        return <g key={i}>
          <circle cx={xS(i)} cy={yS(p.val)} r={isLast?4:2.5}
            fill={isLast?color:"white"} stroke={color} strokeWidth={isLast?0:1.5}/>
          {isLast && <text x={xS(i)} y={yS(p.val)-8} textAnchor="middle"
            fontSize={8} fontWeight="700" fill={color}>{fmt(p.val)}{unit}</text>}
        </g>;
      })}
      {pts.map((p,i)=>{
        if(pts.length<=7||i===0||i===pts.length-1||i%Math.ceil(pts.length/5)===0)
          return <text key={i} x={xS(i)} y={H-3} textAnchor="middle" fontSize={7} fill={C.slateL}>{p.label}</text>;
        return null;
      })}
    </svg>
  );
}

function ChartCard({title,icon,data,color,target,maxVal,minVal,unit,showTotal,fmtVal}) {

function ScreenSecu({ safetyData, flights }) {
  const now=new Date();
  const day=now.getDay()||7;
  const monday=new Date(now);monday.setDate(now.getDate()-day+1);monday.setHours(0,0,0,0);
  const [filterPeriod,setFilterPeriod]=React.useState("Tout");
  const [filterType,setFilterType]=React.useState("Tous");

  // Filter safetyData by period and type
  const days=filterPeriod==="7j"?7:filterPeriod==="30j"?30:filterPeriod==="90j"?90:36500;
  const filtered=safetyData.filter(e=>{
    const d=new Date(e.date);
    const inPeriod=(now-d)/(1000*60*60*24)<=days;
    const inType=filterType==="Tous"||(
      filterType==="Approche"&&e.approche||
      filterType==="TCAS"&&e.tcas||
      filterType==="GPWS"&&e.gpws||
      filterType==="Hard Landing"&&e.hardLanding||
      filterType==="SAFA"&&e.safa
    );
    return inPeriod&&inType;
  });

  // Group by week for charts
  const byWeek={};
  filtered.forEach(e=>{
    const d=new Date(e.date);
    const mon=new Date(d);const wd=d.getDay()||7;mon.setDate(d.getDate()-wd+1);
    const wk=mon.toISOString().slice(5,10);
    if(!byWeek[wk])byWeek[wk]={date:wk,approche:0,tcas:0,gpws:0,hardLanding:0,safa:0,total:0};
    if(e.approche)byWeek[wk].approche++;
    if(e.tcas)byWeek[wk].tcas++;
    if(e.gpws)byWeek[wk].gpws++;
    if(e.hardLanding)byWeek[wk].hardLanding++;

    byWeek[wk].total++;
  });

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <SecuTile label="Approche instable" count={totals.approche} icon="⚠️" color="#DC2626"/>
        <SecuTile label="TCAS RA" count={totals.tcas} icon="📡" color="#DC2626"/>

      <div style={{display:"grid",gridTemplateColumns:"1fr",gap:10}}>
        <SecuTile label="Inspection SAFA" count={totals.safa} icon="🛡" color="#7C3AED"/>

      {filtered.length===0&&(
        <Card><div style={{textAlign:"center",color:C.slateL,fontSize:13,padding:16}}>Aucun événement sur cette période</div></Card>
      )}

      {weeks.length>=2&&(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {[
            {key:"approche",label:"Approches instables",color:C.danger},
            {key:"tcas",label:"TCAS RA",color:C.danger},
            {key:"gpws",label:"GPWS Warnings",color:C.warn},

            <ChartCard key={key} title={label} icon="🛡"

function ScreenPerf({ kpis, flights, finData }) {
  const vols = flights.filter(f=>f.status==="Termine"&&f.consoH>0);
  const consoMoy = vols.length>0 ? Math.round(vols.reduce((s,f)=>s+f.consoH,0)/vols.length) : kpis.consoH||0;
  const consoLabel = vols.length>0 ? "Moy. "+vols.length+" vol(s)" : "Depuis KPI";
  const tPax = flights.reduce((s,f)=>s+f.pax,0);
  const volsNps = flights.filter(f=>f.status==="Termine"&&f.nps>0);
  const npsVal = volsNps.length>0 ? Math.round(volsNps.reduce((s,f)=>s+f.nps,0)/volsNps.length*10)/10 : kpis.nps||0;

  // Build chart data grouped by week for smooth curves
  const byWeek = {};
  flights.filter(f=>f.status==="Termine"&&f.date).forEach(f=>{
    const d = new Date(f.date);
    // Get Monday of that week
    const day = d.getDay()||7;
    const mon = new Date(d); mon.setDate(d.getDate()-day+1);
    const wk = mon.toISOString().slice(5,10); // MM-DD of Monday
    if(!byWeek[wk]) byWeek[wk]={date:wk,vols:[],pax:0,consomme:0,consoVols:0};
    byWeek[wk].vols.push(f);
    byWeek[wk].pax += f.pax;
    if(f.consoH>0){byWeek[wk].consomme+=f.consoH;byWeek[wk].consoVols++;}
  });
  const days = Object.values(byWeek).sort((a,b)=>a.date.localeCompare(b.date));
  const otpScore=f=>f.delayMin<=0?100:f.delayMin<=15?85:f.delayMin<=30?70:f.delayMin<=45?50:25;
  const otpData  = days.map(d=>({label:d.date,val:d.vols.length>0?Math.round(d.vols.reduce((s,f)=>s+otpScore(f),0)/d.vols.length):null}));
  const lfData   = days.map(d=>({label:d.date,val:d.vols.length>0?Math.round(d.vols.reduce((s,f)=>s+f.load,0)/d.vols.length):null}));
  const consoData= days.map(d=>({label:d.date,val:d.consoVols>0?Math.round(d.consomme/d.consoVols):null}));
  const paxData  = days.map(d=>({label:d.date,val:d.pax}));
  const npsData  = days.map(d=>{
    const npsVols=d.vols.filter(f=>f.nps>0);
    return {label:d.date,val:npsVols.length>0?Math.round(npsVols.reduce((s,f)=>s+f.nps,0)/npsVols.length):null};
  });

  // Mini SVG line chart component
  const volsDone = flights.filter(f=>f.status==="Termine");
  const otpVal = volsDone.length>0 ? Math.round(volsDone.reduce((s,f)=>s+otpScore(f),0)/volsDone.length) : kpis.otp||0;
  const lfVal = volsDone.length>0 ? Math.round(volsDone.reduce((s,f)=>s+f.load,0)/volsDone.length) : kpis.loadFactor||0;
  const delayVols = volsDone.filter(f=>f.delayMin>0);
  const delayVal = delayVols.length>0 ? Math.round(delayVols.reduce((s,f)=>s+f.delayMin,0)/delayVols.length) : kpis.delayMin||0;

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* KPI tiles */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <KpiTile title="OTP" value={otpVal} unit="%" accent={otpVal>=90?C.emerald:C.warn} icon="⏰"
          info={"Formule :\nMoyenne pondérée :\n0 min = 100%\n1-15 min = 85%\n16-30 min = 70%\n31-45 min = 50%\n> 45 min = 25%\n\n🟢 ≥ 90%\n🟡 < 90%"}/>
        <KpiTile title="Load Factor" value={lfVal} unit="%" accent={lfVal>=80?C.emerald:C.warn} icon="👥"
          info={"Formule :\nMoyenne (PAX réels / 18 sièges) × 100\nSur vols terminés\n\n🟢 ≥ 80%\n🟡 < 80%"}/>
        <KpiTile title="Retards moy." value={delayVal} unit="min" accent={delayVal>15?C.warn:C.emerald} icon="⚠"
          info={"Formule :\nMoyenne des retards\n(vols avec retard > 0 min)\n\n🟢 ≤ 15 min\n🟡 > 15 min"}/>
        {(()=>{
          return <KpiTile title="NPS moyen" value={npsVal} unit="/10" accent={npsVal>=7?C.emerald:C.warn} icon="⭐" sub={volsNps.length>0?"Moy. "+volsNps.length+" vol(s)":"--"}
            info={"Formule :\nMoyenne NPS saisi post-vol (0-10)\n\n🟢 ≥ 7\n🟡 < 7"}/>;
        })()}
      </div>

      {/* Charts */}
      {days.length>=2 ? (
        <>
          <ChartCard title="Ponctualite OTP" icon="⏰"
            data={otpData} color={C.emerald} target={90} maxVal={100} minVal={60} unit="%"/>
          <ChartCard title="Load Factor" icon="👥"
            data={lfData} color={C.navy} target={80} maxVal={100} minVal={50} unit="%"/>
          <ChartCard title="Conso. carburant moyenne" icon="⛽"
            data={consoData} color={C.gold} target={900} maxVal={1100} minVal={600} unit="kg/h"/>
          <ChartCard title="NPS client" icon="⭐"
            data={npsData} color="#7C3AED" target={70} maxVal={100} minVal={40} unit="%"/>
        </>
      ) : (
        <Card>
          <div style={{textAlign:"center",padding:"20px 0",color:C.slateL}}>
            <div style={{fontSize:32,marginBottom:8}}>📊</div>
            <div style={{fontWeight:600,fontSize:13,color:C.slate}}>Graphiques disponibles</div>
            <div style={{fontSize:12,marginTop:4}}>apres 2 jours de vols enregistres</div>
          </div>
        </Card>
      )}

      {/* Bar trends */}
      <Card>
        <SectionTitle>Indicateurs du jour</SectionTitle>
        <Bar label="OTP" value={otpVal} max={100} unit="%" color={otpVal>=90?C.emerald:C.warn} sub="Objectif: 90%"/>
        <Bar label="Load Factor" value={lfVal} max={100} unit="%" color={lfVal>=80?C.emerald:C.warn} sub="Objectif: 80%"/>
        <Bar label="Retards" value={delayVal} max={60} unit=" min" color={delayVal<=15?C.emerald:C.danger} sub="Seuil: 15 min"/>
        <Bar label="Conso. carburant moyenne" value={consoMoy} max={1000} unit=" kg/h" color={consoMoy<900?C.emerald:C.danger} sub={consoLabel+" · Seuil 900 kg/h"}/>
      </Card>
    </div>
  );
}


function ScreenMaint({ kpis, maintData, flights, aircraft }) {
  const [selAc,setSelAc]=useState(aircraft&&aircraft.length>0?aircraft[0].id:"");
  const acInfo=aircraft?.find(a=>a.id===selAc)||aircraft?.[0]||{};
  // Use per-aircraft data if available, fallback to global maintData
  const md=Object.keys(acInfo).length>0?acInfo:(maintData||{});
  const mels=md.mels||[];
  // Filter flights by selected aircraft - if only 1 aircraft or flights have no acId, use all flights
  const hasAcIds=flights.some(f=>f.acId);
  const acFlights=aircraft&&aircraft.length>1&&hasAcIds?flights.filter(f=>f.acId===selAc||!f.acId):flights;
  // Calculate Tech Delay from flights
  const volsDone=acFlights.filter(f=>f.status==="Termine");
  const techVols=volsDone.filter(f=>f.causeRetard==="Technique");
  const techDelay=volsDone.length>0?Math.round((techVols.length/volsDone.length)*1000)/10:0;
  // Dispatch Reliability
  const volsPlanned=acFlights.filter(f=>f.status!=="Annule");
  const dispatchRel=volsPlanned.length>0?Math.round((volsDone.length/volsPlanned.length)*1000)/10:0;
  // Completion Factor
  const techCancels=acFlights.filter(f=>f.status==="Annule"&&f.causeRetard==="Technique");
  const compBase=volsPlanned.length-techCancels.length;
  const completionFactor=compBase>0?Math.round((volsDone.length/compBase)*1000)/10:0;
  const sevColor=s=>s==="A"?"#DC2626":s==="B"?"#D97706":"#64748B";
  const sevBg=s=>s==="A"?"#FEE2E2":s==="B"?"#FEF3C7":"#F1F5F9";
  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* Aircraft selector */}
      {aircraft&&aircraft.length>0&&(
        <div>
          <select value={selAc} onChange={e=>setSelAc(e.target.value)}
            style={{width:"100%",height:44,boxSizing:"border-box",background:C.navy,border:"none",borderRadius:10,padding:"0 14px",color:"white",fontSize:13,fontWeight:700,outline:"none",appearance:"none"}}>
            {aircraft.map(a=><option key={a.id} value={a.id} style={{background:"white",color:C.navy}}>{a.immat} · {a.type}</option>)}
          </select>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <KpiTile title="TTAF" value={(md.ttaf||0).toLocaleString()} unit="h" accent={C.navy} icon="⏱"/>
        <KpiTile title="MEL actifs" value={mels.length} unit="" accent={mels.length>0?C.warn:C.emerald} icon="⚠"/>
      </div>
      <Card>
        <SectionTitle>Visites périodiques</SectionTitle>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[
            {label:"A-Check",val:md.nextCheckH,warn:100,danger:50},
            {label:"B-Check",val:md.bCheckH,warn:300,danger:100},
            {label:"C-Check",val:md.cCheckH,warn:500,danger:200},
          ].map(({label,val,warn,danger})=>{
            const v=Number(val)||0;
            const color=!val||v===0?C.slate:v<danger?C.danger:v<warn?C.warn:C.emerald;
            const status=!val||v===0?"--":v<danger?"URGENT":v<warn?"Proche":"OK";
            return (
              <div key={label} style={{background:C.bg,borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
                <div style={{fontSize:9,color:C.slate,fontWeight:700,textTransform:"uppercase",marginBottom:4}}>{label}</div>
                <div style={{fontSize:16,fontWeight:800,color:color}}>{val||"--"}{val?" h":""}</div>
                <div style={{fontSize:9,fontWeight:700,color:color,marginTop:2}}>{status}</div>
              </div>
            );
          })}

      </Card>
      <Card>
        <SectionTitle>MEL actifs ({mels.length})</SectionTitle>
        {mels.length===0&&<div style={{textAlign:"center",color:C.slateL,fontSize:13,padding:"12px 0"}}>Aucun MEL actif</div>}
        {mels.map((m,i)=>(
          <div key={i} style={{padding:"10px 0",borderBottom:i<mels.length-1?"1px solid "+C.border:"none",display:"flex",gap:10,alignItems:"center"}}>
            <span style={{background:sevBg(m.sev),color:sevColor(m.sev),padding:"2px 8px",borderRadius:8,fontSize:10,fontWeight:700,flexShrink:0}}>Cat.{m.sev}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.sys}</div>
              <div style={{fontSize:10,color:C.slate}}>{m.mel}{m.exp?" · Exp: "+m.exp:""}</div>
            </div>
          </div>
        ))}
        <div style={{marginTop:10,fontSize:11,color:C.slateL,textAlign:"center"}}>
          Gérer les MEL dans Formulaires → Maintenance
        </div>
      </Card>
      <Card>
        <SectionTitle>Indicateurs CAMO</SectionTitle>
        <Bar label="Fiabilite moteurs" value={md.fiabMoteurs||0} max={100} unit="%" color={(md.fiabMoteurs||0)>=99.5?C.emerald:C.warn} sub="Objectif: 99.5%"/>

      {fd.length>0&&(
        <Card>
          <SectionTitle>Historique mensuel</SectionTitle>
          {fd.map((f,i)=>{
            const m=f.revenus>0?Math.round((1-f.couts/f.revenus)*100):0;
