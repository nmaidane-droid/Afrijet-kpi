  bg:"#F4F7FB", border:"#DDE3ED", card:"#FFFFFF",
  navy:"#0F1F3D", navyMid:"#1D3461",
  emerald:"#00936A", emeraldL:"#D1FAE5", emeraldD:"#006B4D",

const TOP=60, BOT=58, PFX="ajs145_";

const lsGet = k => { try { return localStorage.getItem(k); } catch(_e) { return null; } };
const lsSet = (k,v) => { try { localStorage.setItem(k,v); } catch(_e) {} };

function usePersist(key, init) {
  const fk = PFX+key;
  const [val, setVal] = useState(() => {
    const s = lsGet(fk);
    if (!s) return init;
    try { return JSON.parse(s); } catch(_e) { return init; }
  });
  useEffect(() => {
    if (window.storage) {
      window.storage.get(fk).then(r => {
        if (r && r.value) {
          try { const p=JSON.parse(r.value); setVal(p); lsSet(fk,r.value); } catch(_e) {}
        }
      }).catch(()=>{});
    }
  }, [fk]);
  const set = v => {
    setVal(prev => {
      const next = typeof v === "function" ? v(prev) : v;
      const s = JSON.stringify(next);
      lsSet(fk, s);
      if (window.storage) window.storage.set(fk, s).catch(()=>{});
      return next;
    });
  };
  return [val, set];
}

function clearStorage() {
  try {
    const keys = Object.keys(localStorage).filter(k => k.startsWith(PFX));
    keys.forEach(k => localStorage.removeItem(k));
  } catch(_e) {}
  if (window.storage) {
    window.storage.list(PFX).then(r => {
      (r && r.keys || []).forEach(k => window.storage.delete(k));
    }).catch(()=>{});
  }
}

function PlaneIcon({ size=32, color="#A0720A", heading=0 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none"
      style={{ transform:"rotate("+heading+"deg)", transition:"transform 1s ease", display:"block" }}>
      <path d="M8 32 L24 28 L40 16 L44 18 L32 30 L52 28 L54 31 L32 36 L36 46 L32 47 L26 37 L14 40 Z" fill={color}/>
    </svg>
  );
}

function Card({ children, accent }) {
  return (
    <div style={{ background:C.card, borderRadius:14, border:"1px solid "+C.border,
                  padding:16, boxShadow:"0 1px 4px rgba(0,0,0,.05)",
                  borderTop:accent?"3px solid "+accent:undefined }}>
      {children}
    </div>
  );
}

function KpiTile({ title, value, unit, sub, accent, icon }) {
  return (
    <div style={{ background:C.card, borderRadius:12, padding:14,
                  border:"1px solid "+C.border, borderTop:"3px solid "+(accent||C.slate) }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6 }}>
        <span style={{ fontSize:10, fontWeight:700, color:C.slate,
                       textTransform:"uppercase", letterSpacing:"0.09em" }}>{title}</span>
        <span style={{ fontSize:18 }}>{icon}</span>
      </div>
      <div style={{ fontSize:26, fontWeight:800, color:accent||C.navy, lineHeight:1 }}>
        {value}<span style={{ fontSize:13, color:C.slate }}> {unit}</span>
      </div>
      {sub && <div style={{ fontSize:10, color:C.slateL, marginTop:4 }}>{sub}</div>}
    </div>
  );
}

function Bar({ label, value, max, unit, color, sub }) {
  const pct = Math.min(100, Math.round(value/max*100));
  return (
    <div style={{ marginBottom:10 }}>
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
        <span style={{ fontSize:13, fontWeight:600, color:C.text }}>{label}</span>
        <span style={{ fontSize:13, fontWeight:700, color }}>{value}{unit||""}</span>
      </div>
      <div style={{ background:C.border, borderRadius:6, height:8, overflow:"hidden" }}>
        <div style={{ width:pct+"%", background:color, height:"100%", borderRadius:6, transition:"width .8s ease" }}/>
      </div>
      {sub && <div style={{ fontSize:11, color:C.slate, marginTop:3 }}>{sub}</div>}
    </div>
  );
}

function SectionTitle({ children }) {
  return (
    <div style={{ fontSize:10, fontWeight:700, color:C.slate,
                  textTransform:"uppercase", letterSpacing:"0.1em",
                  marginBottom:10, paddingBottom:6, borderBottom:"1px solid "+C.border }}>
      {children}

}

function FLabel({ children }) {
  return (
    <label style={{ fontSize:10, fontWeight:700, color:C.slate,
                    textTransform:"uppercase", letterSpacing:"0.09em",
                    display:"block", marginBottom:5 }}>
      {children}
    </label>
  );
}

function FField({ label, value, onChange, type="text", min, max, placeholder }) {
  const [focused, setFocused] = useState(false);
  return (
    <div>
      <FLabel>{label}</FLabel>
      <input type={type} value={value} min={min} max={max} placeholder={placeholder}
        onChange={e => onChange(e.target.value)}
        onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
        style={{ width:"100%", height:48, boxSizing:"border-box",
                 background:focused?"#FFF":C.bg, border:"1.5px solid "+(focused?C.gold:C.border),
                 borderRadius:10, padding:"0 14px", color:C.text, fontSize:14, outline:"none" }}/>
    </div>
  );
}

function FSelect({ label, value, onChange, options }) {
  return (
    <div>
      <FLabel>{label}</FLabel>
      <select value={value} onChange={e=>onChange(e.target.value)}
        style={{ width:"100%", height:48, boxSizing:"border-box", background:C.bg,
                 border:"1.5px solid "+C.border, borderRadius:10, padding:"0 14px",
                 color:C.text, fontSize:14, outline:"none", appearance:"none" }}>
        {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
      </select>
    </div>
  );
}

function FGrid({ children }) {
  return <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>{children}</div>;
}

function FCalc({ label, value, sub, color="#00936A", wide }) {
  return (
    <div style={{ gridColumn:wide?"1 / -1":"auto" }}>
      <FLabel>{label}</FLabel>
      <div style={{ height:48, background:"#F0FDF4", border:"1.5px solid "+color,
                    borderRadius:10, display:"flex", alignItems:"center",

        <span style={{ fontSize:20, fontWeight:800, color }}>{value}</span>
        {sub && <span style={{ fontSize:9, color:C.slate }}>{sub}</span>}
      </div>
    </div>
  );
}

function FSection({ title, color="#64748B" }) {
  return (
    <div style={{ fontSize:10, fontWeight:700, color, textTransform:"uppercase",
                  letterSpacing:"0.09em", borderBottom:"1.5px solid "+color+"40",
                  paddingBottom:4, marginTop:4 }}>

    </div>

}

function FSubmit({ label, color="#0F1F3D", onClick }) {

}

}

function simulateFlightState(icao24) {
  const now       = Date.now();
  const seed      = Math.sin(now / 8000);   // slow oscillation
  const seed2     = Math.cos(now / 6000);
  const seed3     = Math.sin(now / 4000);

  // Progress 0->1 on a 55-min loop
  const elapsed   = (now % (55 * 60 * 1000)) / (55 * 60 * 1000);

  // Interpolate lat/lon along CMN->FEZ great circle
  const lat = 33.3675 + (33.9273 - 33.3675) * elapsed;
  const lon = -7.5900 + (-4.9778 - (-7.5900)) * elapsed;

  // Realistic EMB 145 cruise: FL280, 440-460 kt
  const cruiseAlt  = 8534;  // meters ~ FL280
  // Climb/cruise/descend profile
  let altM;
  if (elapsed < 0.15)       altM = cruiseAlt * (elapsed / 0.15);
  else if (elapsed > 0.85)  altM = cruiseAlt * ((1 - elapsed) / 0.15);
  else                      altM = cruiseAlt + seed * 80;

  const speed_ms   = 225 + seed2 * 8;          // ~440-460 kt in m/s
  const heading    = 72 + seed3 * 3;            // ENE toward FEZ, slight wobble
  const vertRate   = elapsed < 0.15 ? 8.5
                   : elapsed > 0.85 ? -7.2
                   : seed * 0.5;

  return {
    icao24:      icao24 || "020035",
    callsign:    "AJS03",
    country:     "Morocco",
    lat,
    lon,
    onGround:    false,
    heading,
    vertRate_ms: vertRate,
    squawk:      "2341",
    lastContact: Math.floor(now / 1000),
    speed_kt:    Math.round(speed_ms * 1.94384),
    alt_ft:      Math.round(altM * 3.28084),
    flightLevel: Math.round(altM * 3.28084 / 100),
    simulated:   true,
  };
}

// Generate ~12 simulated Morocco traffic blips
function parseState(s) {
  if(!s||!Array.isArray(s))return null;
  return {lat:s[6],lon:s[5],heading:s[10]||0,alt_m:s[7]||0,speed_ms:s[9]||0,callsign:(s[1]||"").trim(),simulated:false};
}

async function fetchByIcao24(icao24) {
  try {
    const r = await Promise.race([
      fetch(`https://opensky-network.org/api/states/all?icao24=${icao24.toLowerCase()}`),
      new Promise((_, rej) => setTimeout(() => rej(new Error("timeout")), 4000))
    ]);
    if (r.ok) {
      const j = await r.json();
      if (j.states?.[0]) return j.states[0];
    }
  } catch(_e) {}
  return null;
}

// ── Forms ────────────────────────────────────────────────────────────────────
function FormVol({ onSubmit, crew }) {
  const today=new Date().toISOString().slice(0,10);
  const CAPA=5700;
  const [num,setNum]=useState("");
  const [from_,setFrom]=useState("CMN");
  const [to,setTo]=useState("AGA");
  const [dep,setDep]=useState("");
  const [arr,setArr]=useState("");
  const [pax,setPax]=useState("18");
  const [date,setDate]=useState(today);
  const [carbDep,setCDep]=useState("");
  const [cm1,setCm1]=useState("");
  const [cm2,setCm2]=useState("");
  const [cc,setCc]=useState("");

  const pn=Math.min(18,Math.max(0,Number(pax)||0));
  const load=Math.round(pn/18*100);
  const fPct=carbDep?Math.round(Number(carbDep)/CAPA*100):null;
  const fClr=fPct>=40?"#00936A":fPct>=25?"#D97706":"#DC2626";

  const submit=()=>{
    if(!num.trim()||!dep||!arr){alert("N vol, depart et arrivee requis");return;}
    // Pre-calculate planned duration
    let planDuree=0;
    if(dep&&arr){
      const [dh,dm]=dep.split(":").map(Number);
      const [ah,am]=arr.split(":").map(Number);
      const diff=(ah*60+am)-(dh*60+dm);
      if(diff>0) planDuree=diff;
    }
    onSubmit({num:num.trim().toUpperCase(),from:from_,to,dep,arr,depReal:"",arrReal:"",
      status:"Planifie",pax:pn,load,date,
      carbDep:Number(carbDep)||0,carbArr:0,consomme:0,consoH:0,fuelPct:fPct||0,delayMin:0,
      cm1:cm1.trim(),cm2:cm2.trim(),cc:cc.trim(),nps:0,dureeMin:planDuree});
    setNum("");setDep("");setArr("");setPax("18");setCDep("");
    setCm1("");setCm2("");setCc("");
  };
  return (
    <Card accent="#0F1F3D">
      <FHeader icon="✈" title="Preparation du vol" subtitle="Donnees planifiees avant depart" color="#0F1F3D"/>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <FGrid><FField label="N Vol *" value={num} onChange={setNum} placeholder="AJS07"/><FField label="Date" value={date} onChange={setDate} type="date"/></FGrid>
        <FSection title="Route" color="#0F1F3D"/>
        <FGrid><FAirport label="Depart" value={from_} onChange={setFrom}/><FAirport label="Arrivee" value={to} onChange={setTo}/></FGrid>
        <FSection title="Horaires planifies" color="#0F1F3D"/>
        <FGrid><FField label="Depart prevu *" value={dep} onChange={setDep} type="time"/><FField label="Arrivee prevue *" value={arr} onChange={setArr} type="time"/></FGrid>
        <FSection title="Passagers prevus" color="#0F1F3D"/>
        <FGrid>
          <FField label="PAX (0-18)" value={pax} onChange={v=>setPax(String(Math.min(18,Math.max(0,Number(v)||0))))} type="number" min={0} max={18}/>
          <FCalc label="Remplissage" value={load+"%"} color={load>=80?"#00936A":load>=60?"#D97706":"#DC2626"}/>
        </FGrid>
        <FSection title={"Carburant embarque — Capacite "+CAPA+" kg"} color="#0F1F3D"/>
        <FGrid>
          <FField label="Fuel depart (kg)" value={carbDep} onChange={setCDep} type="number" min={0} max={CAPA} placeholder="ex: 4500"/>
          <FCalc label="Niveau depart" value={fPct!==null?fPct+"%":"--"} sub={carbDep?carbDep+" kg":""} color={fPct!==null?fClr:"#94A3B8"}/>
        </FGrid>
        <FSection title="Equipage" color="#0F1F3D"/>
        <FGrid>
          <div>
            <FLabel>CM1 — Commandant</FLabel>
            <select value={cm1} onChange={e=>setCm1(e.target.value)}
              style={{width:"100%",height:48,boxSizing:"border-box",background:C.bg,border:"1.5px solid "+C.border,borderRadius:10,padding:"0 14px",color:cm1?C.text:C.slateL,fontSize:13,outline:"none",appearance:"none"}}>
              <option value="">-- Choisir --</option>
              {(crew||[]).filter(m=>m.role==="CM1").map(m=>(
                <option key={m.id} value={m.prenom+" "+m.nom}>{m.prenom} {m.nom}</option>
              ))}
            </select>
          </div>
          <div>
            <FLabel>CM2 — Copilote</FLabel>
            <select value={cm2} onChange={e=>setCm2(e.target.value)}
              style={{width:"100%",height:48,boxSizing:"border-box",background:C.bg,border:"1.5px solid "+C.border,borderRadius:10,padding:"0 14px",color:cm2?C.text:C.slateL,fontSize:13,outline:"none",appearance:"none"}}>
              <option value="">-- Choisir --</option>
              {(crew||[]).filter(m=>m.role==="CM1"||m.role==="CM2").map(m=>(
                <option key={m.id} value={m.prenom+" "+m.nom}>{m.prenom} {m.nom}</option>
              ))}
            </select>
          </div>
        </FGrid>
        <div>
          <FLabel>CC — Hotesse / Steward</FLabel>
          <select value={cc} onChange={e=>setCc(e.target.value)}

function FormEquipage({ crew, setCrew }) {
  const ROLES = ["CM1","CM2","CC"];
  const [nom,setNom]       = useState("");
  const [prenom,setPrenom] = useState("");
  const [role,setRole]     = useState("CM1");
  const [licence,setLic]   = useState("");
  const [editing,setEditing] = useState(null); // id en cours d edition

  const addOrUpdate = () => {
    if (!nom.trim()||!prenom.trim()) { alert("Nom et prenom requis"); return; }
    if (editing !== null) {
      setCrew(c => c.map(m => m.id===editing
        ? {...m,nom:nom.trim(),prenom:prenom.trim(),role,licence:licence.trim()}
        : m));
      setEditing(null);
    } else {
      const newId = Math.max(0,...(crew||[]).map(m=>m.id))+1;
      setCrew(c => [...c, {id:newId,nom:nom.trim(),prenom:prenom.trim(),role,licence:licence.trim()}]);
    }
    setNom("");setPrenom("");setRole("CM1");setLic("");
  };

  const startEdit = m => {
    setEditing(m.id); setNom(m.nom); setPrenom(m.prenom);
    setRole(m.role); setLic(m.licence||"");
  };

  const remove = id => setCrew(c => c.filter(m => m.id!==id));
  const cancel = () => { setEditing(null);setNom("");setPrenom("");setRole("CM1");setLic(""); };

  const roleColor = r => r==="CM1"?"#0F1F3D":r==="CM2"?"#0369A1":"#00936A";
  const roleBg    = r => r==="CM1"?"#E0E7FF":r==="CM2"?"#E0F2FE":"#D1FAE5";

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <Card accent="#0369A1">
        <FHeader icon="👨‍✈️" title={editing!==null?"Modifier membre":"Ajouter membre"} subtitle="Registre equipage CN-KTA" color="#0369A1"/>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <FGrid>
            <FField label="Nom *" value={nom} onChange={setNom} placeholder="Alami"/>
            <FField label="Prenom *" value={prenom} onChange={setPrenom} placeholder="Karim"/>
          </FGrid>
          <FGrid>
            <FSelect label="Role" value={role} onChange={setRole}
              options={ROLES.map(r=>({value:r,label:r==="CM1"?"CM1 — Commandant":r==="CM2"?"CM2 — Copilote":"CC — Hotesse"}))}/>
            <FField label="Licence / Matricule" value={licence} onChange={setLic} placeholder="ATPL-A 12345"/>
          </FGrid>
          <div style={{display:"flex",gap:10}}>
            {editing!==null && (
              <button onClick={cancel}
                style={{flex:1,height:48,background:C.bg,border:"1.5px solid "+C.border,borderRadius:10,color:C.slate,fontSize:14,fontWeight:700,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
                Annuler
              </button>
            )}
            <button onClick={addOrUpdate}
              style={{flex:2,height:48,background:"#0369A1",border:"none",borderRadius:10,color:"white",fontSize:14,fontWeight:700,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
              {editing!==null?"Enregistrer modifications":"+ Ajouter"}
            </button>
          </div>
        </div>
      </Card>

      <div style={{background:"white",borderRadius:12,border:"1px solid "+C.border,overflow:"hidden"}}>
        <div style={{padding:"9px 14px",background:C.bg,borderBottom:"1px solid "+C.border,fontSize:10,fontWeight:700,color:C.slate,textTransform:"uppercase"}}>
          {(crew||[]).length} membres enregistres
        </div>
        {(crew||[]).length===0 && (
          <div style={{padding:20,textAlign:"center",color:C.slateL,fontSize:13}}>Aucun membre enregistre</div>
        )}
        {ROLES.map(r => {
          const members = (crew||[]).filter(m=>m.role===r);
          if (members.length===0) return null;
          return (
            <div key={r}>
              <div style={{padding:"6px 14px",background:roleBg(r),fontSize:9,fontWeight:800,color:roleColor(r),textTransform:"uppercase",letterSpacing:"0.1em"}}>

              </div>
              {members.map((m,i)=>(
                <div key={m.id} style={{display:"flex",alignItems:"center",padding:"10px 14px",borderBottom:"1px solid "+C.border,gap:10}}>
                  <div style={{width:34,height:34,borderRadius:"50%",background:roleBg(r),flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:roleColor(r)}}>
                    {m.prenom[0]}{m.nom[0]}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13,color:C.text}}>{m.prenom} {m.nom}</div>
                    <div style={{fontSize:10,color:C.slate}}>{m.licence||"—"}</div>

function ScreenOps({ flights, onUpdateFlight }) {
  const [edit,setEdit]=useState(null);
  const [search,setSearch]=useState("");
  const [filterStatus,setFilterStatus]=useState("Tous");
  const sBg=s=>s==="Termine"?C.emeraldL:s==="En vol"?C.goldL:s==="Annule"?C.dangerL:C.bg;
  const sTx=s=>s==="Termine"?C.emeraldD:s==="En vol"?C.gold:s==="Annule"?C.danger:C.slate;
  const sIc=s=>s==="Termine"?"✓":s==="En vol"?"✈":s==="Annule"?"✗":"○";

  // Filter flights
  const filtered=flights.filter(f=>{
    const q=search.trim().toUpperCase();
    if(q){
      const dateShort=f.date?f.date.slice(8)+"/"+f.date.slice(5,7):"";
      const route=(f.from||"")+"-"+(f.to||"");
      const match=(f.num||"").includes(q)||
        route.includes(q)||
        (f.from||"").includes(q)||
        (f.to||"").includes(q)||
        (f.date||"").includes(q)||
        dateShort.includes(q)||
        (f.cm1||"").toUpperCase().includes(q);
      if(!match)return false;
    }
    if(filterStatus!=="Tous"&&f.status!==filterStatus)return false;
    return true;
  });

  const calcEdit=ef=>{
    if(!ef)return{};
    let delayMin=0;
    if(ef.arr&&ef.arrReal){
      const [ph,pm]=ef.arr.split(":").map(Number);
      const [rh,rm]=ef.arrReal.split(":").map(Number);
      const diff=(rh*60+rm)-(ph*60+pm);
      if(diff>15)delayMin=diff;
    }
    let consomme=0,consoH=0,fuelPct=ef.fuelPct||0;
    if(ef.carbDep>0&&ef.carbArr>0){
      consomme=ef.carbDep-ef.carbArr;
      fuelPct=Math.round(ef.carbArr/5700*100);
      if(ef.depReal&&ef.arrReal){
        const [dh,dm]=ef.depReal.split(":").map(Number);
        const [ah,am]=ef.arrReal.split(":").map(Number);
        const h=((ah*60+am)-(dh*60+dm))/60;
        if(h>0)consoH=Math.round(consomme/h);
      }
    }
    // Duration
    let dureeMin=0;
    const dep2=ef.depReal||ef.dep, arr2=ef.arrReal||ef.arr;
    if(dep2&&arr2){
      const [dh,dm]=dep2.split(":").map(Number);
      const [ah,am]=arr2.split(":").map(Number);
      const diff=(ah*60+am)-(dh*60+dm);
      if(diff>0) dureeMin=diff;
    }
    return{delayMin,consomme,consoH,fuelPct,nps:ef.nps||0,dureeMin};
  };

  const doUpdate=()=>{
    if(!edit)return;
    const c=calcEdit(edit);
    onUpdateFlight({...edit,load:Math.round(edit.pax/18*100),...c});
    setEdit(null);
  };

  const enVol=flights.filter(f=>f.status==="En vol");
  const done=flights.filter(f=>f.status==="Termine");
  const planned=flights.filter(f=>f.status==="Planifie");

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {edit&&(
        <div style={{position:"fixed",inset:0,zIndex:400,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"flex-end"}}>
          <div style={{background:"white",width:"100%",borderRadius:"20px 20px 0 0",padding:"20px 16px 36px",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
              <div>
                <div style={{fontWeight:800,fontSize:17,color:C.navy}}>{edit.num}</div>
                <div style={{fontSize:12,color:C.slate}}>{edit.from} vers {edit.to} | {edit.dep} - {edit.arr}</div>
              </div>
              <button onClick={()=>setEdit(null)} style={{background:"none",border:"none",fontSize:22,color:C.slate,cursor:"pointer"}}>x</button>
            </div>
            <div style={{marginBottom:16}}>
              <FLabel>Statut</FLabel>
              <div style={{display:"flex",gap:8}}>
                {["Planifie","En vol","Termine","Annule"].map(s=>(
                  <button key={s} onClick={()=>setEdit({...edit,status:s})}
                    style={{flex:1,padding:"9px 4px",borderRadius:9,border:"1.5px solid",fontSize:10,fontWeight:700,cursor:"pointer",WebkitTapHighlightColor:"transparent",borderColor:edit.status===s?sTx(s):C.border,background:edit.status===s?sBg(s):"white",color:edit.status===s?sTx(s):C.slate}}>
                    {sIc(s)} {s}
                  </button>
                ))}
              </div>
            </div>
            {(edit.status==="En vol"||edit.status==="Termine")&&(
              <div>
                <div style={{fontSize:10,fontWeight:700,color:C.gold,textTransform:"uppercase",marginBottom:8}}>Au decollage</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                  <div>
                    <FLabel>Decollage reel</FLabel>
                    <input type="time" value={edit.depReal||""} onChange={e=>setEdit({...edit,depReal:e.target.value})}
                      style={{width:"100%",height:48,borderRadius:10,border:"1.5px solid "+C.border,padding:"0 12px",fontSize:14,outline:"none",background:C.bg,boxSizing:"border-box"}}/>
                  </div>
                  <div>
                    <FLabel>PAX reels</FLabel>
                    <input type="number" min={0} max={18} value={edit.pax}
                      onChange={e=>setEdit({...edit,pax:Math.min(18,Math.max(0,Number(e.target.value)||0))})}
                      style={{width:"100%",height:48,borderRadius:10,border:"1.5px solid "+C.border,padding:"0 12px",fontSize:14,outline:"none",background:C.bg,boxSizing:"border-box"}}/>
                  </div>
                </div>
              </div>
            )}
            {edit.status==="Termine"&&(
              <div>

                  </div>

function ScreenPerf({ kpis, flights, finData }) {
  const vols = flights.filter(f=>f.status==="Termine"&&f.consoH>0);
  const consoMoy = vols.length>0 ? Math.round(vols.reduce((s,f)=>s+f.consoH,0)/vols.length) : kpis.consoH||0;
  const consoLabel = vols.length>0 ? "Moy. "+vols.length+" vol(s)" : "Depuis KPI";
  const tPax = flights.reduce((s,f)=>s+f.pax,0);
  const volsNps = flights.filter(f=>f.status==="Termine"&&f.nps>0);
  const npsVal = volsNps.length>0 ? Math.round(volsNps.reduce((s,f)=>s+f.nps,0)/volsNps.length) : kpis.nps||0;

  // Build chart data grouped by week for smooth curves
  const byWeek = {};
  flights.filter(f=>f.status==="Termine"&&f.date).forEach(f=>{
    const d = new Date(f.date);
    // Get Monday of that week
    const day = d.getDay()||7;
    const mon = new Date(d); mon.setDate(d.getDate()-day+1);
    const wk = mon.toISOString().slice(5,10); // MM-DD of Monday
    if(!byWeek[wk]) byWeek[wk]={date:wk,vols:[],pax:0,consomme:0,consoVols:0};
    byWeek[wk].vols.push(f);
    byWeek[wk].pax += f.pax;
    if(f.consoH>0){byWeek[wk].consomme+=f.consoH;byWeek[wk].consoVols++;}
  });
  const days = Object.values(byWeek).sort((a,b)=>a.date.localeCompare(b.date));
  const otpScore=f=>f.delayMin<=0?100:f.delayMin<=15?85:f.delayMin<=30?70:f.delayMin<=45?50:25;
  const otpData  = days.map(d=>({label:d.date,val:d.vols.length>0?Math.round(d.vols.reduce((s,f)=>s+otpScore(f),0)/d.vols.length):null}));
  const lfData   = days.map(d=>({label:d.date,val:d.vols.length>0?Math.round(d.vols.reduce((s,f)=>s+f.load,0)/d.vols.length):null}));
  const consoData= days.map(d=>({label:d.date,val:d.consoVols>0?Math.round(d.consomme/d.consoVols):null}));
  const paxData  = days.map(d=>({label:d.date,val:d.pax}));
  const npsData  = days.map(d=>{
    const npsVols=d.vols.filter(f=>f.nps>0);
    return {label:d.date,val:npsVols.length>0?Math.round(npsVols.reduce((s,f)=>s+f.nps,0)/npsVols.length):null};
  });

  // Mini SVG line chart component
  const LineChart = ({data, color, target, maxVal, minVal, unit}) => {
    const W=300, H=90, padL=28, padR=8, padT=10, padB=20;
    const cW=W-padL-padR, cH=H-padT-padB;
    const pts = data.filter(d=>d.val!==null);
    if(pts.length<2) return (
      <div style={{textAlign:"center",padding:"20px",color:C.slateL,fontSize:12}}>
        Donnees insuffisantes (min. 2 jours)
      </div>
    );
    const vals = pts.map(p=>p.val);
    const lo = minVal!==undefined ? minVal : Math.max(0,Math.min(...vals)-10);
    const hi = maxVal!==undefined ? maxVal : Math.max(...vals)+10;
    const range = hi-lo||1;
    const xS = i => padL + (i/(pts.length-1))*cW;
    const yS = v => padT + cH - ((v-lo)/range)*cH;
    const pathD = pts.map((p,i)=>(i===0?"M":"L")+xS(i).toFixed(1)+","+yS(p.val).toFixed(1)).join(" ");
    const areaD = pathD+" L"+xS(pts.length-1).toFixed(1)+","+(padT+cH)+" L"+padL.toFixed(1)+","+(padT+cH)+" Z";
    const ty  = target!==undefined ? yS(Math.min(hi,Math.max(lo,target))) : null;
    const lastPt = pts[pts.length-1];
    return (
      <svg width="100%" viewBox={"0 0 "+W+" "+H} style={{display:"block",overflow:"visible"}}>
        {/* Grid */}
        {[0,0.5,1].map((t,i)=>{
          const yy=padT+cH*t, lv=Math.round(hi-t*(hi-lo));
          return <g key={i}>
            <line x1={padL} y1={yy} x2={W-padR} y2={yy} stroke={C.border} strokeWidth={0.5} strokeDasharray="3,3"/>
            <text x={padL-3} y={yy+3} textAnchor="end" fontSize={7} fill={C.slateL}>{lv}</text>
          </g>;
        })}
        {/* Target line */}
        {ty!=null && <g>
          <line x1={padL} y1={ty} x2={W-padR} y2={ty} stroke={color} strokeWidth={0.8} strokeDasharray="3,2" opacity={0.45}/>
          <text x={W-padR+2} y={ty+3} fontSize={6} fill={color} opacity={0.6}>Obj</text>
        </g>}

        {/* Area */}
        <path d={areaD} fill={color} fillOpacity={0.07}/>
        {/* Line */}
        <path d={pathD} fill="none" stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"/>
        {/* Points */}
        {pts.map((p,i)=>{
          const isLast = i===pts.length-1;
          return <g key={i}>
            <circle cx={xS(i)} cy={yS(p.val)} r={isLast?4:2.5}
              fill={isLast?color:"white"} stroke={color} strokeWidth={isLast?0:1.5}/>
            {isLast && <text x={xS(i)} y={yS(p.val)-8} textAnchor="middle"
              fontSize={8} fontWeight="700" fill={color}>{p.val}{unit}</text>}
          </g>;
        })}

        {/* X labels */}
        {pts.map((p,i)=>{
          if(pts.length<=7||i===0||i===pts.length-1||i%Math.ceil(pts.length/5)===0)
            return <text key={i} x={xS(i)} y={H-3} textAnchor="middle" fontSize={7} fill={C.slateL}>{p.label}</text>;
          return null;
        })}
      </svg>
    );
  };

  const ChartCard = ({title,icon,data,color,target,maxVal,minVal,unit}) => {
    const pts = data.filter(d=>d.val!==null);
    const avg = pts.length>0 ? Math.round(pts.reduce((s,p)=>s+p.val,0)/pts.length) : null;
    return (
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:700,color:C.slate,textTransform:"uppercase",letterSpacing:"0.09em"}}>{icon} {title}</div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:22,fontWeight:800,color}}>{avg!==null?avg:"--"}{unit}</div>
            <div style={{fontSize:9,color:C.slateL}}>Moyenne — {pts.length} jour(s)</div>
          </div>
        </div>
        <LineChart data={data} color={color} target={target} maxVal={maxVal} minVal={minVal} unit={unit}/>
      </Card>
    );
  };

  const volsDone = flights.filter(f=>f.status==="Termine");
  const otpVal = volsDone.length>0 ? Math.round(volsDone.reduce((s,f)=>s+otpScore(f),0)/volsDone.length) : kpis.otp||0;
  const lfVal = volsDone.length>0 ? Math.round(volsDone.reduce((s,f)=>s+f.load,0)/volsDone.length) : kpis.loadFactor||0;
  const delayVols = volsDone.filter(f=>f.delayMin>0);
  const delayVal = delayVols.length>0 ? Math.round(delayVols.reduce((s,f)=>s+f.delayMin,0)/delayVols.length) : kpis.delayMin||0;

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* KPI tiles */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <KpiTile title="OTP" value={otpVal} unit="%" accent={otpVal>=90?C.emerald:C.warn} icon="⏰"/>
        <KpiTile title="Load Factor" value={lfVal} unit="%" accent={lfVal>=80?C.emerald:C.warn} icon="👥"/>
        <KpiTile title="Retards moy." value={delayVal} unit="min" accent={delayVal>15?C.warn:C.emerald} icon="⚠"/>
        {(()=>{
          return <KpiTile title="NPS moyen" value={npsVal} unit="%" accent={npsVal>=70?C.emerald:C.warn} icon="⭐" sub={volsNps.length>0?"Moy. "+volsNps.length+" vol(s)":"--"}/>;
        })()}
      </div>

      {/* Charts */}
      {days.length>=2 ? (
        <>
          <ChartCard title="Ponctualite OTP" icon="⏰"
            data={otpData} color={C.emerald} target={90} maxVal={100} minVal={60} unit="%"/>
          <ChartCard title="Load Factor" icon="👥"
            data={lfData} color={C.navy} target={80} maxVal={100} minVal={50} unit="%"/>
          <ChartCard title="Conso. carburant moyenne" icon="⛽"
            data={consoData} color={C.gold} target={900} maxVal={1100} minVal={600} unit="kg/h"/>
          <ChartCard title="NPS passagers" icon="⭐"
            data={npsData} color="#7C3AED" target={70} maxVal={100} minVal={40} unit="%"/>
        </>
      ) : (
        <Card>
          <div style={{textAlign:"center",padding:"20px 0",color:C.slateL}}>
            <div style={{fontSize:32,marginBottom:8}}>📊</div>
            <div style={{fontWeight:600,fontSize:13,color:C.slate}}>Graphiques disponibles</div>
            <div style={{fontSize:12,marginTop:4}}>apres 2 jours de vols enregistres</div>
          </div>
        </Card>
      )}

      {/* Bar trends */}
      <Card>
        <SectionTitle>Indicateurs du jour</SectionTitle>
        <Bar label="OTP" value={kpis.otp} max={100} unit="%" color={kpis.otp>=90?C.emerald:C.warn} sub="Objectif: 90%"/>
        <Bar label="Load Factor" value={kpis.loadFactor} max={100} unit="%" color={kpis.loadFactor>=80?C.emerald:C.warn} sub="Objectif: 80%"/>
        <Bar label="Retards" value={kpis.delayMin} max={60} unit=" min" color={kpis.delayMin<=15?C.emerald:C.danger} sub="Seuil: 15 min"/>
        <Bar label="Conso. carburant moyenne" value={consoMoy} max={1000} unit=" kg/h" color={consoMoy<900?C.emerald:C.danger} sub={consoLabel+" · Seuil 900 kg/h"}/>
      </Card>
    </div>
  );
}

              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:600,color:C.text}}>{m.sys}</div>
                <div style={{fontSize:10,color:C.slate}}>{m.mel} · Exp: {m.exp}</div>
              </div>
            </div>
          ))}
        </Card>
      )}
      <Card>
        <SectionTitle>Indicateurs CAMO</SectionTitle>
        <Bar label="Fiabilite moteurs" value={md.fiabMoteurs||0} max={100} unit="%" color={(md.fiabMoteurs||0)>=99.5?C.emerald:C.warn} sub="Objectif: 99.5%"/>
        <Bar label="Tech delay" value={md.techDelay||0} max={5} unit="%" color={(md.techDelay||0)<2?C.emerald:C.danger} sub="Seuil: 2%"/>
      </Card>
    </div>
  );
}

function ScreenFin({ finData }) {
  const fd=finData||[];
  const tRev=fd.reduce((s,f)=>s+f.revenus,0);
  const tCout=fd.reduce((s,f)=>s+f.couts,0);
  const marge=tRev>0?Math.round((1-tCout/tRev)*100):0;
  const fmt=n=>Math.round(n/1000)+"K";
  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <KpiTile title="Revenus cumul. 2026" value={fmt(tRev)} unit="MAD" accent={C.emerald} icon="💰"/>
        <KpiTile title="Marge brute" value={marge} unit="%" accent={marge>=20?C.emerald:C.warn} icon="📊"/>
      </div>
      {fd.length>0&&(
        <Card>
          <SectionTitle>Historique mensuel</SectionTitle>
          {fd.map((f,i)=>{
            const m=f.revenus>0?Math.round((1-f.couts/f.revenus)*100):0;
            return (
              <div key={i} style={{display:"flex",alignItems:"center",padding:"8px 0",borderBottom:i<fd.length-1?"1px solid "+C.border:"none",gap:10}}>
                <div style={{fontWeight:600,fontSize:13,color:C.text,minWidth:70}}>{f.mois}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:C.slate}}>Rev: {Math.round(f.revenus/1000)}K MAD</div>
                  <div style={{fontSize:11,color:C.slate}}>Cout: {Math.round(f.couts/1000)}K MAD</div>
                </div>
                <div style={{fontWeight:800,fontSize:14,color:m>=20?C.emerald:m>=10?C.warn:C.danger}}>{m}%</div>
              </div>
            );
          })}
        </Card>
      )}
    </div>
  );
}

// ── Report ───────────────────────────────────────────────────────────────────
function buildReport(flights, kpis, now, finData, maintData) {
  const ds=now.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
  const G="#00936A",O="#D97706",N="#0F1F3D";
  const volsDoneR=flights.filter(f=>f.status==="Termine");
  const done=volsDoneR.length;
  const tPax=flights.reduce((s,f)=>s+f.pax,0);
  const md=maintData||{};
  const mels=(md.mels||[]);
  const fd=finData||[];
  const tRev=fd.reduce((s,f)=>s+f.revenus,0);
  const tCout=fd.reduce((s,f)=>s+f.couts,0);
  const marge=tRev>0?Math.round((1-tCout/tRev)*1000)/10:0;

  // Computed KPIs from flights
  const otpScoreR=f=>f.delayMin<=0?100:f.delayMin<=15?85:f.delayMin<=30?70:f.delayMin<=45?50:25;
  const rOtp=volsDoneR.length>0?Math.round(volsDoneR.reduce((s,f)=>s+otpScoreR(f),0)/volsDoneR.length):kpis.otp||0;
  const rLf=volsDoneR.length>0?Math.round(volsDoneR.reduce((s,f)=>s+f.load,0)/volsDoneR.length):kpis.loadFactor||0;
  const rDelayVols=volsDoneR.filter(f=>f.delayMin>0);
  const rDelay=rDelayVols.length>0?Math.round(rDelayVols.reduce((s,f)=>s+f.delayMin,0)/rDelayVols.length):kpis.delayMin||0;
  const rConsoVols=volsDoneR.filter(f=>f.consoH>0);
  const rConso=rConsoVols.length>0?Math.round(rConsoVols.reduce((s,f)=>s+f.consoH,0)/rConsoVols.length):kpis.consoH||0;
  const rNpsVols=volsDoneR.filter(f=>f.nps>0);
  const rNps=rNpsVols.length>0?Math.round(rNpsVols.reduce((s,f)=>s+f.nps,0)/rNpsVols.length):kpis.nps||0;

  const row=(v1,l1,c1,v2,l2,c2,v3,l3,c3)=>
    "<div style='display:grid;grid-template-columns:1fr 1fr 1fr'><div style='text-align:center;padding:10px 4px;border-right:1px solid #EEF2F8'><div style='font-size:20px;font-weight:800;color:"+c1+"'>"+v1+"</div><div style='font-size:9px;color:#64748B;font-weight:700;text-transform:uppercase'>"+l1+"</div></div><div style='text-align:center;padding:10px 4px;border-right:1px solid #EEF2F8'><div style='font-size:20px;font-weight:800;color:"+c2+"'>"+v2+"</div><div style='font-size:9px;color:#64748B;font-weight:700;text-transform:uppercase'>"+l2+"</div></div><div style='text-align:center;padding:10px 4px'><div style='font-size:20px;font-weight:800;color:"+c3+"'>"+v3+"</div><div style='font-size:9px;color:#64748B;font-weight:700;text-transform:uppercase'>"+l3+"</div></div></div>";

  const kpiLine=(l,v,o,ok)=>
    "<div style='display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #EEF2F8'><div style='flex:1;font-size:12px;color:#475569'>"+l+"<div style='font-size:10px;color:#94A3B8'>Objectif: "+o+"</div></div><div style='font-weight:800;font-size:13px;color:"+N+";padding-right:8px'>"+v+"</div><span style='background:"+(ok?"#D1FAE5":"#FEF3C7")+";color:"+(ok?"#065F46":"#92400E")+";padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700'>"+(ok?"OK":"Att.")+"</span></div>";

  const sec=(t,c)=>"<div style='background:"+c+";color:white;padding:7px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em'>"+t+"</div>";
  const card=c=>"<div style='background:white;border:1px solid #E2E8F0;border-radius:10px;overflow:hidden;margin:10px 12px'>"+c+"</div>";

  const gridStyle="display:grid;grid-template-columns:46px 64px 68px 36px 32px 20px 40px;align-items:center;padding:4px 6px;border-bottom:1px solid #EEF2F8;";
  const fHeader="<div style='"+gridStyle+"background:#EEF2F8;border-bottom:1px solid #DDE3ED'>"
    +"<div style='font-size:8px;font-weight:700;color:#64748B;text-transform:uppercase;padding-left:11px'>Vol</div>"
    +"<div style='font-size:8px;font-weight:700;color:#64748B;text-transform:uppercase;text-align:center'>Route</div>"
    +"<div style='font-size:8px;font-weight:700;color:#64748B;text-transform:uppercase;text-align:center'>BLK Time</div>"
    +"<div style='font-size:8px;font-weight:700;color:#64748B;text-transform:uppercase;text-align:center'>Date</div>"
    +"<div style='font-size:8px;font-weight:700;color:#64748B;text-transform:uppercase;text-align:center'>FLT</div>"
    +"<div style='font-size:8px;font-weight:700;color:#64748B;text-transform:uppercase;text-align:center'>Pax</div>"
    +"<div style='font-size:8px;font-weight:700;color:#64748B;text-transform:uppercase;text-align:right'>CM1</div>"
    +"</div>";
  const fRows=fHeader+flights.map((f,i)=>{
    const dot=f.status==="Termine"?"#00936A":f.status==="En vol"?"#D97706":"#94A3B8";
    let durVal="--";
    if(f.status==="Termine"&&f.depReal&&f.arrReal&&f.depReal.length>=4&&f.arrReal.length>=4){
      const[dh,dm]=f.depReal.split(":").map(Number);
      const[ah,am]=f.arrReal.split(":").map(Number);
      const r=(ah*60+am)-(dh*60+dm);
      if(r>0)durVal=Math.floor(r/60)+"h"+String(r%60).padStart(2,"0");
    } else if(f.dureeMin>0){
      durVal=Math.floor(f.dureeMin/60)+"h"+String(f.dureeMin%60).padStart(2,"0");
    }
    const durColor=f.status==="Termine"?"#00936A":"#94A3B8";
    const dateShort=f.date?f.date.slice(8)+"/"+f.date.slice(5,7):"--";
    const cm1Last=(f.cm1||"--").split(" ").slice(-1)[0];
    return "<div style='"+gridStyle+"background:"+(i%2?"#F8FAFC":"white")+"'>"
      +"<div style='display:flex;align-items:center;gap:4px'><span style='width:7px;height:7px;border-radius:50%;background:"+dot+";display:inline-block;flex-shrink:0'></span><span style='font-weight:800;font-size:10px;color:#0F1F3D'>"+f.num+"</span></div>"
      +"<div style='font-size:10px;font-weight:700;white-space:nowrap;text-align:center'>"+f.from+"→"+f.to+"</div>"
      +"<div style='font-size:8.5px;color:#64748B;white-space:nowrap;text-align:center'>"+f.dep+"-"+f.arr+"</div>"
      +"<div style='font-size:8.5px;color:#94A3B8;white-space:nowrap'>"+dateShort+"</div>"
      +"<div style='font-size:10px;font-weight:700;color:"+durColor+";text-align:center'>"+durVal+"</div>"
      +"<div style='font-size:10px;text-align:center'>"+f.pax+"</div>"
      +"<div style='font-size:9px;color:#64748B;text-align:right'>"+cm1Last+"</div>"
      +"</div>";
  }).join("");

  const melRows=mels.map(m=>
    "<div style='padding:6px 12px;border-top:1px solid #EEF2F8;display:flex;gap:8px;align-items:center'><span style='background:#FEF3C7;color:#A0720A;padding:1px 6px;border-radius:6px;font-size:9px;font-weight:700'>Cat."+m.sev+"</span><div style='flex:1;font-size:11px'>"+m.sys+"</div><div style='font-size:10px;color:#64748B'>"+m.exp+"</div></div>"
  ).join("");

  const finRows=fd.map((f,i)=>{
    const m=f.revenus>0?Math.round((1-f.couts/f.revenus)*100):0;
    return "<div style='display:flex;align-items:center;padding:7px 12px;border-bottom:1px solid #EEF2F8;background:"+(i%2?"#F8FAFC":"white")+"'><div style='flex:1;font-size:12px;font-weight:600'>"+f.mois+"</div><div style='font-size:11px;color:#1E293B'>"+Math.round(f.revenus/1000)+"K MAD</div><div style='font-size:11px;color:#64748B;min-width:40px;text-align:right'>"+m+"%</div></div>";
  }).join("");

  return (
    "<div style='font-family:Arial,sans-serif;background:#F8FAFC;padding-bottom:20px'><div style='background:linear-gradient(135deg,#0F1F3D,#1D3461);padding:16px 12px 14px'><div style='color:#A0720A;font-size:9px;font-weight:700;text-transform:uppercase;margin-bottom:4px'>Afrijet Sahara</div><div style='color:white;font-size:18px;font-weight:800;margin-bottom:2px'>Rapport KPI Journalier</div><div style='color:#94A3B8;font-size:11px'>EMB 145 CN-KTA \u00B7 18 sieges Business \u00B7 "+ds+"</div></div>"+
    card(row(done,"Termines",G,flights.filter(f=>f.status==="En vol").length,"En vol",O,tPax,"PAX total",N))+
    card(sec("Performance","#0F1F3D")+
      kpiLine("OTP (ponctualite)",rOtp+"%","90%",rOtp>=90)+
      kpiLine("Load Factor",rLf+"%","80%",rLf>=80)+
      kpiLine("Retards moy.",rDelay+" min","15 min",rDelay<=15)+
      kpiLine("Conso. carburant",rConso+" kg/h","900 kg/h",rConso<900)+
      kpiLine("NPS passagers",rNps+"/100","70",rNps>=70)
    )+
    card(sec("Operations — "+flights.length+" rotations","#0F1F3D")+fRows)+
    card(sec("Maintenance CAMO","#00936A")+
      row((md.ttaf||0)+"h","TTAF",N,(md.nextCheckH||kpis.nextCheckH||0)+"h","A-Check dans",(md.nextCheckH||kpis.nextCheckH||999)<50?"#DC2626":G,kpis.melCount,"MEL actifs",kpis.melCount>0?O:G)+
      melRows
    )+
    (fd.length>0?card(sec("Finances Cumul 2026","#7C3AED")+
      row(Math.round(tRev/1000)+"K","Revenus (MAD)",G,Math.round(tCout/1000)+"K","Couts (MAD)",N,marge+"%","Marge brute",marge>=20?G:O)+
      finRows
    ):"")+
    "<div style='text-align:center;padding:12px;font-size:9px;color:#94A3B8'>Afrijet Sahara \u00B7 EMB 145 CN-KTA \u00B7 DGAC Maroc \u00B7 Confidentiel</div></div>"
  );
}

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [now,setNow]         = useState(new Date());
  const [tab,setTab]         = usePersist("tab","forms");
  const [flights,setFlights] = usePersist("flights",INIT_FLIGHTS);
  // Auto-upgrade: if demo data is old (fewer than 8 flights), reload with new demo
  useEffect(()=>{
    if(flights.length>0 && flights.length<8 && flights.every(f=>f.num&&f.num.startsWith("AJS"))){
      const hasOldData = !flights.some(f=>f.date==="2026-06-24"||f.date==="2026-06-25");
      if(hasOldData) setFlights(INIT_FLIGHTS);
    }
  },[]);
  const [kpis,setKpis]       = usePersist("kpis",INIT_KPIS);
  const [maintData,setMaint] = usePersist("maint",INIT_MAINT);
  const [finData,setFin]     = usePersist("fin",INIT_FIN);
  const [crew,setCrew]       = usePersist("crew",INIT_CREW);
  const [dismissed,setDism]  = usePersist("dismissed",[]);
  const [icao24,setIcao24]   = usePersist("icao24","020035");
  const [ac,setAc]           = useState(null);
  const [mTraffic,setMTraff] = useState([]);
  const [loading,setLoading] = useState(false);
  const [showReset,setReset] = useState(false);
  const [report,setReport]   = useState(null);
  const [saveOk,setSaveOk]   = useState(false);

  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),30000);return()=>clearInterval(t);},[]);

  // Auto-save every 15 minutes
  useEffect(()=>{
    const t=setInterval(async()=>{
      if(window.storage){
        const data={flights,kpis,maintData,finData,dismissed,icao24};
        await window.storage.set(PFX+"snapshot",JSON.stringify(data)).catch(()=>{});
      }
      setSaveOk(true);setTimeout(()=>setSaveOk(false),2000);
    }, 15*60*1000);
    return()=>clearInterval(t);
  },[flights,kpis,maintData,finData,dismissed,icao24]);

  const refresh = async () => {
    setLoading(true);
    try {
      const [st,tr] = await Promise.all([fetchByIcao24(icao24),fetchMorocco()]);
      if(st){const p=parseState(st);if(p){setAc({...p,simulated:false,alt_ft:p.alt_m?Math.round(p.alt_m*3.281):null,speed_kt:p.speed_ms?Math.round(p.speed_ms*1.944):null});}}
      else{setAc(simulateFlightState(icao24));}
      setMTraff(tr);
    } catch(_e){setAc(simulateFlightState(icao24));}
    setLoading(false);
  };

  useEffect(()=>{refresh();},[]);

  const doSave = async () => {
    if(window.storage){
      const data={flights,kpis,maintData,finData,dismissed,icao24};
      await window.storage.set(PFX+"snapshot",JSON.stringify(data)).catch(()=>{});
    }
    setSaveOk(true);setTimeout(()=>setSaveOk(false),2000);
  };

  const doReset = async () => {
    clearStorage();
    setFlights(INIT_FLIGHTS);setKpis(INIT_KPIS);setMaint(INIT_MAINT);setFin(INIT_FIN);
    setDism([]);setReport(null);setReset(false);setTab("forms");
  };

  const allAlerts  = computeAlerts(kpis,flights);
  const critCount  = allAlerts.filter(a=>!dismissed.includes(a.id)).length;
  const timeStr    = now.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});

  const TABS=[
    {id:"forms",icon:"📝",label:"Formulaires"},
    {id:"live", icon:"📡",label:"Live"},
    {id:"carte",icon:"🗺",label:"Carte"},
    {id:"alertes",icon:"🔔",label:"Alertes"},
    {id:"ops",  icon:"✈", label:"Ops."},
    {id:"perf", icon:"📊",label:"Perf."},
    {id:"maint",icon:"🔧",label:"Maint."},
    {id:"fin",  icon:"💰",label:"Finances"},
  ];

  return (
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"Inter,-apple-system,system-ui,sans-serif",display:"flex",flexDirection:"column",position:"relative"}}>
      <style>{`*{box-sizing:border-box;margin:0;padding:0;}@keyframes dot-pulse{0%,100%{opacity:1}50%{opacity:.5}}input,select,button{-webkit-tap-highlight-color:transparent;font-family:inherit;}::-webkit-scrollbar{display:none;}`}</style>

      {/* TOP BAR */}
      <div style={{background:C.white,borderBottom:"1px solid "+C.border,padding:"0 12px",height:TOP,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 6px rgba(0,0,0,.06)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
          <div style={{width:34,height:34,borderRadius:9,flexShrink:0,background:"linear-gradient(135deg,#A0720A,#00936A)",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <PlaneIcon size={20} color="#FFFFFF" heading={ac?ac.heading||0:0}/>
          </div>
          <div style={{minWidth:0}}>
            <div style={{fontWeight:800,fontSize:13,color:C.navy,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>AFRIJET SAHARA</div>
            <div style={{fontSize:9,color:C.gold,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em"}}>EMB 145 · CN-KTA</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:ac&&!ac.simulated?C.emerald:ac?C.warn:C.border,flexShrink:0}}/>
            <span style={{fontSize:11,color:C.slate,fontWeight:600}}>{ac&&!ac.simulated?"LIVE":"SIM"}</span>
          </div>
          <span style={{fontSize:12,fontWeight:700,color:C.navy}}>{timeStr}</span>
          <button onClick={doSave}
            title="Sauvegarde auto: 15 min"
            style={{width:36,height:36,background:saveOk?C.emerald:C.navy,border:"none",borderRadius:9,cursor:"pointer",color:"white",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",WebkitTapHighlightColor:"transparent"}}>
            {saveOk?"✓":"💾"}
          </button>
          <button onClick={()=>setReport(buildReport(flights,kpis,now,finData,maintData))}
            style={{width:36,height:36,background:C.emerald,border:"none",borderRadius:9,cursor:"pointer",color:"white",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",WebkitTapHighlightColor:"transparent"}}>
            📋
          </button>
        </div>
      </div>

      {/* CONTENT */}
      <div style={{flex:1,overflowY:"auto",padding:"14px 14px "+(BOT+14)+"px"}}>

        {tab==="live"    && <ScreenLive ac={ac} moroccoTraffic={mTraffic} icao24={icao24} setIcao24={setIcao24} onRefresh={refresh} loading={loading}/>}

        {tab==="perf"    && <ScreenPerf kpis={kpis} flights={flights} finData={finData}/>}
        {tab==="maint"   && <ScreenMaint kpis={kpis} maintData={maintData}/>}

      </div>

        <div style={{position:"fixed",inset:0,zIndex:700,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"white",borderRadius:16,padding:24,width:"100%",maxWidth:340,boxShadow:"0 8px 32px rgba(0,0,0,.3)"}}>
            <div style={{fontSize:32,textAlign:"center",marginBottom:12}}>🗑</div>
            <div style={{fontWeight:800,fontSize:16,color:C.navy,textAlign:"center",marginBottom:8}}>Reinitialiser l application</div>
            <div style={{fontSize:13,color:C.slate,textAlign:"center",lineHeight:1.6,marginBottom:20}}>Toutes les donnees demo seront effacees. Vous pourrez saisir vos vraies donnees.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setReset(false)}
                style={{flex:1,height:48,background:C.bg,border:"1.5px solid "+C.border,borderRadius:10,color:C.slate,fontSize:14,fontWeight:700,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
                Annuler
              </button>
              <button onClick={doReset}
                style={{flex:1,height:48,background:"#DC2626",border:"none",borderRadius:10,color:"white",fontSize:14,fontWeight:700,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
                Reinitialiser
              </button>
            </div>
          </div>
        </div>
      )}

      {/* RAPPORT MODAL */}
      {report&&(
        <div style={{position:"fixed",inset:0,zIndex:500,display:"flex",flexDirection:"column",background:"#0F1F3D"}}>
          <div style={{padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,borderBottom:"2px solid #A0720A"}}>
            <div>
              <div style={{color:"white",fontWeight:800,fontSize:14}}>Rapport KPI</div>
              <div style={{color:"#A0720A",fontSize:10}}>Afrijet Sahara · EMB 145 CN-KTA</div>
            </div>
            <button onClick={()=>setReport(null)}
              style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:8,padding:"8px 16px",color:"white",fontSize:13,fontWeight:700,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
              Fermer
            </button>
          </div>

          {/* PDF Export */}
          <div style={{padding:"10px 16px",background:"#0A1628",borderBottom:"1px solid rgba(255,255,255,.1)",flexShrink:0}}>
            <button onClick={()=>{
              if(!window.jspdf){alert("jsPDF non charge. Verifiez votre connexion.");return;}
              try {
                const { jsPDF } = window.jspdf;
                // Compute chart data from flights grouped by week
                const byWeekP={};
                flights.filter(f=>f.status==="Termine"&&f.date).forEach(f=>{
                  const d=new Date(f.date);
                  const day=d.getDay()||7;
                  const mon=new Date(d);mon.setDate(d.getDate()-day+1);
                  const wk=mon.toISOString().slice(5,10);
                  if(!byWeekP[wk])byWeekP[wk]={date:wk,vols:[],pax:0,delayed:0,consomme:0,consoVols:0};
                  byWeekP[wk].vols.push(f);byWeekP[wk].pax+=f.pax;
                  if(f.delayMin>15)byWeekP[wk].delayed++;
                  if(f.consoH>0){byWeekP[wk].consomme+=f.consoH;byWeekP[wk].consoVols++;}
                });
                const days=Object.values(byWeekP).sort((a,b)=>a.date.localeCompare(b.date));
                const otpScore2=f=>f.delayMin<=0?100:f.delayMin<=15?85:f.delayMin<=30?70:f.delayMin<=45?50:25;
                const otpData=days.map(d=>({label:d.date,val:d.vols.length>0?Math.round(d.vols.reduce((s,f)=>s+otpScore2(f),0)/d.vols.length):null}));
                const lfData=days.map(d=>({label:d.date,val:d.vols.length>0?Math.round(d.vols.reduce((s,f)=>s+f.load,0)/d.vols.length):null}));
                const consoData=days.map(d=>({label:d.date,val:d.consoVols>0?Math.round(d.consomme/d.consoVols):null}));
                const paxData=days.map(d=>({label:d.date,val:d.pax}));
                const npsData2=days.map(d=>{const nv=d.vols.filter(f=>f.nps>0);return{label:d.date,val:nv.length>0?Math.round(nv.reduce((s,f)=>s+f.nps,0)/nv.length):null};});
                const doc = new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
                const PW=210, PH=297, M=15, CW=PW-M*2;
                let y=0;

                // ── Cover header ──
                doc.setFillColor(15,31,61);
                doc.rect(0,0,PW,36,"F");
                doc.setFillColor(160,114,10);
                doc.rect(0,33,PW,3,"F");

                // Logo
                doc.setFillColor(160,114,10);
                doc.circle(M+7,16,6,"F");
                doc.setTextColor(255,255,255);
                doc.setFontSize(8);
                doc.setFont("helvetica","bold");
                doc.text("AJS",M+7,19,"center");

                // Title
                doc.setTextColor(255,255,255);
                doc.setFontSize(15);
                doc.setFont("helvetica","bold");
                doc.text("RAPPORT KPI JOURNALIER",M+18,13);
                doc.setFontSize(8);
                doc.setFont("helvetica","normal");
                doc.setTextColor(148,163,184);
                const ds=now.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
                doc.text(ds.toUpperCase(),M+18,20);
                doc.setTextColor(160,114,10);
                doc.setFontSize(7.5);
                doc.setFont("helvetica","bold");
                doc.text("EMB 145  |  CN-KTA  |  18 SIEGES BUSINESS  |  DGAC MAROC",M+18,27);
                y=42;

                // ── KPI Summary cards ──
                const volsDoneP=flights.filter(f=>f.status==="Termine");
                const done=volsDoneP.length;
                const tPax=flights.reduce((s,f)=>s+f.pax,0);
                const otpScoreP=f=>f.delayMin<=0?100:f.delayMin<=15?85:f.delayMin<=30?70:f.delayMin<=45?50:25;
                const pOtp=volsDoneP.length>0?Math.round(volsDoneP.reduce((s,f)=>s+otpScoreP(f),0)/volsDoneP.length):kpis.otp||0;
                const pLf=volsDoneP.length>0?Math.round(volsDoneP.reduce((s,f)=>s+f.load,0)/volsDoneP.length):kpis.loadFactor||0;
                const pDelayVols=volsDoneP.filter(f=>f.delayMin>0);
                const pDelay=pDelayVols.length>0?Math.round(pDelayVols.reduce((s,f)=>s+f.delayMin,0)/pDelayVols.length):kpis.delayMin||0;
                const pConsoVols=volsDoneP.filter(f=>f.consoH>0);
                const pConso=pConsoVols.length>0?Math.round(pConsoVols.reduce((s,f)=>s+f.consoH,0)/pConsoVols.length):kpis.consoH||0;
                const pNpsVols=volsDoneP.filter(f=>f.nps>0);
                const pNps=pNpsVols.length>0?Math.round(pNpsVols.reduce((s,f)=>s+f.nps,0)/pNpsVols.length):kpis.nps||0;
                const cards=[
                  {v:done+"/"+flights.length,l:"Vols termines",c:[0,147,106],ok:true},
                  {v:pOtp+"%",l:"OTP Ponctualite",c:pOtp>=90?[0,147,106]:[217,119,6],ok:pOtp>=90},
                  {v:pLf+"%",l:"Load Factor",c:pLf>=80?[0,147,106]:[217,119,6],ok:pLf>=80},
                  {v:tPax+" pax",l:"PAX total",c:[15,31,61],ok:true},
                ];
                const cw=(CW-9)/4;
                cards.forEach((card,i)=>{
                  const x=M+i*(cw+3);
                  doc.setFillColor(...card.c);
                  doc.roundedRect(x,y,cw,16,2,2,"F");
                  doc.setTextColor(255,255,255);
                  doc.setFontSize(13);
                  doc.setFont("helvetica","bold");
                  doc.text(String(card.v),x+cw/2,y+9,"center");
                  doc.setFontSize(6);
                  doc.setFont("helvetica","normal");
                  doc.text(card.l.toUpperCase(),x+cw/2,y+14,"center");
                });
                y+=22;

                // ── Section helper ──
                const drawSection=(title,r,g,b)=>{
                  if(y>260){doc.addPage();y=15;}
                  doc.setFillColor(r,g,b);
                  doc.roundedRect(M,y,CW,6,1,1,"F");
                  doc.setTextColor(255,255,255);
                  doc.setFontSize(7.5);
                  doc.setFont("helvetica","bold");
                  doc.text(title,M+4,y+4.5);
                  y+=9;
                };

                const drawRow=(label,val,ok,isLast)=>{
                  if(y>275){doc.addPage();y=15;}
                  doc.setFillColor(248,250,252);
                  doc.rect(M,y-3,CW,6,"F");
                  doc.setTextColor(71,85,105);
                  doc.setFontSize(7.5);
                  doc.setFont("helvetica","normal");
                  doc.text(label,M+3,y);
                  doc.setTextColor(15,31,61);
                  doc.setFont("helvetica","bold");
                  doc.text(String(val),M+CW-35,y,"right");
                  if(ok!==undefined){
                    const bc=ok?[0,147,106]:[217,119,6];
                    doc.setFillColor(...bc);
                    doc.roundedRect(M+CW-22,y-2.5,18,4.5,1,1,"F");
                    doc.setTextColor(255,255,255);
                    doc.setFontSize(6);
                    doc.text(ok?"OK":"Att.",M+CW-13,y,"center");
                  }
                  y+=6;
                  if(!isLast){
                    doc.setDrawColor(226,232,240);
                    doc.setLineWidth(0.2);
                    doc.line(M,y-2,M+CW,y-2);
                  }
                  y+=1;
                };

                // ── Performance ──
                drawSection("  PERFORMANCE OPERATIONNELLE",15,31,61);
                drawRow("Ponctualite OTP",pOtp+"%",pOtp>=90);
                drawRow("Load Factor",pLf+"%",pLf>=80);
                drawRow("Retards moyens",pDelay+" min",pDelay<=15);
                drawRow("Consommation carburant",pConso+" kg/h",pConso<900);
                drawRow("NPS passagers",pNps+"/100",pNps>=70,true);
                y+=4;

                // ── Operations ──
                drawSection("  ROTATIONS  ("+flights.length+" vols)",15,31,61);

                // Column positions
                const C0=M+2,C1=M+22,C2=M+62,C3=M+95,C4=M+114,C5=M+126,C6=M+148;

                // Header row
                doc.setFillColor(30,52,97);
                doc.rect(M,y-3,CW,6,"F");
                doc.setTextColor(255,255,255);
                doc.setFontSize(6);
                doc.setFont("helvetica","bold");
                doc.text("VOL",C0+8,y,"center");
                doc.text("ROUTE",C1+18,y,"center");
                doc.text("BLK TIME",C2+14,y,"center");
                doc.text("DATE",C3+8,y,"center");
                doc.text("FLT",C4+4,y,"center");
                doc.text("Pax",C5+4,y,"center");
                doc.text("CM1",C6,y);
                y+=7;
                doc.setFont("helvetica","normal");

                flights.forEach((f,idx)=>{
                  if(y>270){doc.addPage();y=15;}
                  doc.setFillColor(idx%2===0?248:255, idx%2===0?250:255, idx%2===0?252:255);
                  doc.rect(M,y-3,CW,7,"F");

                  // Status dot
                  const dotC=f.status==="Termine"?[0,147,106]:f.status==="En vol"?[217,119,6]:[148,163,184];
                  doc.setFillColor(...dotC);
                  doc.circle(C0+2,y,1.2,"F");

                  // Vol
                  doc.setTextColor(15,31,61);
                  doc.setFontSize(6.5);
                  doc.setFont("helvetica","bold");
                  doc.text(f.num,C0+6,y);

                  // Route
                  doc.setFontSize(7.5);
                  doc.text(f.from+"->"+f.to,C1+18,y,"center");

                  // BLK Time
                  doc.setFont("helvetica","normal");
                  doc.setTextColor(100,116,139);
                  doc.setFontSize(6.5);
                  doc.text(f.dep+"-"+f.arr,C2+14,y,"center");

                  // Date
                  const dateF=f.date?f.date.slice(8)+"/"+f.date.slice(5,7):"--";
                  doc.text(dateF,C3+8,y,"center");

                  // FLT
                  let durVal="--";
                  if(f.status==="Termine"&&f.depReal&&f.arrReal&&f.depReal.length>=4&&f.arrReal.length>=4){
                    const[dh,dm]=f.depReal.split(":").map(Number);
                    const[ah,am]=f.arrReal.split(":").map(Number);
                    const r=(ah*60+am)-(dh*60+dm);
                    if(r>0)durVal=Math.floor(r/60)+"h"+String(r%60).padStart(2,"0");
                  } else if(f.dureeMin>0){
                    durVal=Math.floor(f.dureeMin/60)+"h"+String(f.dureeMin%60).padStart(2,"0");
                  }
                  doc.setTextColor(f.status==="Termine"?0:100, f.status==="Termine"?147:116, f.status==="Termine"?106:139);
                  doc.setFont("helvetica","bold");
                  doc.setFontSize(7);
                  doc.text(durVal,C4+4,y,"center");

                  // Pax
                  doc.setTextColor(15,31,61);
                  doc.setFont("helvetica","normal");
                  doc.setFontSize(7);
                  doc.text(String(f.pax),C5+4,y,"center");

                  // CM1
                  const cm1L=(f.cm1||"--").split(" ").slice(-1)[0];
                  doc.setTextColor(100,116,139);
                  doc.setFontSize(6.5);
                  doc.text(cm1L,C6,y);

                  // Row separator
                  doc.setDrawColor(226,232,240);
                  doc.setLineWidth(0.2);
                  doc.line(M,y+3,M+CW,y+3);
                  y+=7;
                });
                y+=3;

                // ── Page 2 ──
                doc.addPage();
                y=15;

                // ── Maintenance ──
                const md=maintData||{};
                drawSection("  MAINTENANCE CAMO",0,147,106);
                drawRow("TTAF actuel",(md.ttaf||"--")+" h");
                drawRow("Prochain A-Check dans",(md.nextCheckH||kpis.nextCheckH||"--")+" h",(md.nextCheckH||kpis.nextCheckH||0)>50);
                drawRow("MEL actifs",kpis.melCount+" item(s)",kpis.melCount===0);
                drawRow("Fiabilite moteurs",(md.fiabMoteurs||"--")+"%",(md.fiabMoteurs||0)>=99.5);
                drawRow("Tech delay",(md.techDelay||0)+"%",(md.techDelay||0)<2,true);
                y+=4;

                // ── Finances ──
                const fd=finData||[];
                if(fd.length>0){
                  const tRev=fd.reduce((s,f)=>s+f.revenus,0);
                  const tCout=fd.reduce((s,f)=>s+f.couts,0);
                  const marge=tRev>0?Math.round((1-tCout/tRev)*100):0;
                  drawSection("  FINANCES - CUMUL 2026",124,58,237);
                  drawRow("Revenus cumules",Math.round(tRev/1000)+"K MAD");
                  drawRow("Couts cumules",Math.round(tCout/1000)+"K MAD");
                  drawRow("Marge brute",marge+"%",marge>=20,true);
                  y+=4;
                }

                // ── Graphiques evolution ──
                if(days.length>=2){
                  drawSection("  GRAPHIQUES D EVOLUTION",15,31,61);
                  y+=2;

                  const drawChart=(chartData,title,color,target,minV,maxV,unitLabel)=>{
                    if(y>255){doc.addPage();y=15;}
                    const pts=chartData.filter(d=>d.val!==null);
                    if(pts.length<2)return;
                    const cX=M, cY=y, cW2=CW, cH2=22;
                    const lo=minV!==undefined?minV:Math.max(0,Math.min(...pts.map(p=>p.val))-5);
                    const hi=maxV!==undefined?maxV:Math.max(...pts.map(p=>p.val))+5;
                    const range=hi-lo||1;
                    const xS=i=>cX+(i/(pts.length-1))*cW2;
                    const yS=v=>cY+cH2-((v-lo)/range)*cH2;

                    const avgVal=Math.round(pts.reduce((s,p)=>s+p.val,0)/pts.length);
                    doc.setTextColor(71,85,105);
                    doc.setFontSize(7);
                    doc.setFont("helvetica","bold");
                    doc.text(title,cX,cY-1);
                    const r=color[0],g=color[1],b=color[2];
                    doc.setTextColor(r,g,b);
                    doc.text("Moy: "+String(avgVal)+unitLabel,cX+CW,cY-1,"right");

                    doc.setFillColor(248,250,252);
                    doc.roundedRect(cX,cY,cW2,cH2,1,1,"F");

                    doc.setDrawColor(226,232,240);
                    doc.setLineWidth(0.2);
                    [0,0.5,1].forEach(t=>{
                      const yy=cY+cH2*t;
                      doc.line(cX,yy,cX+cW2,yy);
                      doc.setTextColor(148,163,184);
                      doc.setFontSize(5.5);
                      doc.setFont("helvetica","normal");
                      doc.text(String(Math.round(hi-t*(hi-lo))),cX-1,yy+1,"right");
                    });

                    if(target!==undefined){
                      const ty2=yS(Math.min(hi,Math.max(lo,target)));
                      doc.setDrawColor(r,g,b);
                      doc.setLineWidth(0.4);
                      doc.setLineDashPattern([1.5,1.5],0);
                      doc.line(cX,ty2,cX+cW2,ty2);
                      doc.setLineDashPattern([],0);
                    }

                    doc.setDrawColor(r,g,b);
                    doc.setLineWidth(1.2);
                    for(let i=1;i<pts.length;i++){
                      doc.line(xS(i-1),yS(pts[i-1].val),xS(i),yS(pts[i].val));
                    }
                    pts.forEach((p,i)=>{
                      doc.setFillColor(r,g,b);
                      doc.circle(xS(i),yS(p.val),0.7,"F");
                    });
                    pts.forEach((p,i)=>{
                      if(pts.length<=7||i===0||i===pts.length-1||i%Math.ceil(pts.length/5)===0){
                        doc.setTextColor(148,163,184);
                        doc.setFontSize(5);
                        doc.setFont("helvetica","normal");
                        doc.text(p.label,xS(i),cY+cH2+3.5,"center");
                      }
                    });
                    y+=cH2+9;
                  };

                  drawChart(otpData,"Ponctualite OTP",[0,147,106],90,60,100,"%");                  drawChart(lfData,"Load Factor",[15,31,61],80,50,100,"%");
                  drawChart(consoData,"Consommation carburant",[160,114,10],900,600,1100," kg/h");
                  drawChart(npsData2,"NPS passagers",[124,58,237],70,40,100,"%");
                }

                // ── Footer on all pages ──
                const nbPages=doc.internal.getNumberOfPages();
                for(let p=1;p<=nbPages;p++){
                  doc.setPage(p);
                  doc.setFillColor(15,31,61);
                  doc.rect(0,PH-10,PW,10,"F");
                  doc.setFillColor(160,114,10);
                  doc.rect(0,PH-11,PW,1,"F");
                  doc.setTextColor(255,255,255);
                  doc.setFontSize(6.5);
                  doc.setFont("helvetica","normal");
                  doc.text("AFRIJET SAHARA  |  EMB 145 CN-KTA  |  DGAC MAROC  |  CONFIDENTIEL",PW/2,PH-4,"center");
                  doc.setTextColor(160,114,10);
                  doc.setFont("helvetica","bold");
                  doc.text("Page "+p+"/"+nbPages,PW-M,PH-4,"right");
                }

                doc.save("Rapport_KPI_Afrijet_"+now.toISOString().slice(0,10)+".pdf");
              } catch(e) {
                alert("Erreur PDF: "+e.message);
              }
            }}
              style={{width:"100%",height:46,background:"linear-gradient(135deg,#7C3AED,#5B21B6)",border:"none",borderRadius:10,color:"white",fontSize:14,fontWeight:700,cursor:"pointer",WebkitTapHighlightColor:"transparent",display:"flex",alignItems:"center",justifyContent:"center",gap:8,letterSpacing:"0.05em"}}>
              <span style={{fontSize:20}}>📄</span> Telecharger le rapport PDF
            </button>
          </div>

          <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
            <div dangerouslySetInnerHTML={{__html:report}}/>
          </div>
        </div>
      )}

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",height:BOT,background:C.white,borderTop:"1px solid "+C.border,display:"flex",alignItems:"stretch",boxShadow:"0 -2px 12px rgba(0,0,0,.08)",zIndex:200}}>
        {TABS.map(t=>{
          const active=tab===t.id;
          const badge=t.id==="alertes"&&critCount>0?critCount:null;
          return (
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,padding:"6px 2px",position:"relative",WebkitTapHighlightColor:"transparent",borderTop:active?"2.5px solid "+C.gold:"2.5px solid transparent"}}>
              <span style={{fontSize:17,lineHeight:1}}>{t.icon}</span>
              <span style={{fontSize:8,fontWeight:active?700:500,color:active?C.gold:C.slate}}>{t.label}</span>
              {badge&&(
                <div style={{position:"absolute",top:4,right:"50%",transform:"translateX(10px)",background:C.danger,color:"white",borderRadius:10,minWidth:16,height:16,fontSize:9,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>
                  {badge}
                </div>
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}


  </script>
